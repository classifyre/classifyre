<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tabs</title>
  <style>
    @font-face { font-family: 'IBM Plex Sans'; font-weight: 400; src: url('../fonts/IBMPlexSans-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'IBM Plex Sans'; font-weight: 500; src: url('../fonts/IBMPlexSans-Medium.ttf') format('truetype'); }
    @font-face { font-family: 'IBM Plex Sans'; font-weight: 600; src: url('../fonts/IBMPlexSans-SemiBold.ttf') format('truetype'); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      font-size: 12px;
      user-select: none;
    }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      display: flex;
      align-items: flex-end;
      height: 44px;
    }

    .drag-spacer {
      width: 78px;
      height: 100%;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .tabs {
      display: flex;
      align-items: flex-end;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 1px;
      height: 100%;
      padding-top: 8px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 34px;
      min-width: 80px;
      max-width: 200px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0.03em;
      font-size: 11.5px;
      color: #7c7c7c;
      background: transparent;
      border-radius: 6px 6px 0 0;
      transition: color 0.12s, background 0.12s;
      position: relative;
      flex-shrink: 0;
    }

    .tab:hover { color: #bfbfbf; background: #1a1a1a; }

    .tab.active {
      color: #f5f5f5;
      background: #121212;
      font-weight: 600;
    }

    .tab.active::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #b7ff00;
      border-radius: 2px 2px 0 0;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: #121212;
      z-index: 11;
    }

    .tab-icon { font-size: 13px; flex-shrink: 0; }

    .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .tab-close {
      width: 18px; height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: 15px;
      line-height: 1;
      color: #7c7c7c;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }

    .tab:hover .tab-close { display: flex; }
    .tab-close:hover { background: #ff2b2b; color: #fff; }

    .tab-home {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: background 0.12s;
      position: relative;
    }

    .tab-home img { width: 20px; height: 20px; border-radius: 3px; pointer-events: none; }
    .tab-home:hover { background: #1a1a1a; }

    .tab-home.active { background: #121212; }
    .tab-home.active::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #b7ff00;
      border-radius: 2px 2px 0 0;
    }
    .tab-home.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: #121212;
      z-index: 11;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: #1a1a1a;
      z-index: 10;
      pointer-events: none;
    }

    .update-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      height: 26px;
      margin: 0 8px;
      align-self: center;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      flex-shrink: 0;
    }

    .update-badge.available { display: flex; background: #b7ff00; color: #0a0a0a; }
    .update-badge.available:hover { background: #d4ff66; }
    .update-badge.downloading { display: flex; background: #1a1a1a; color: #b7ff00; cursor: default; }
    .update-badge.ready { display: flex; background: #b7ff00; color: #0a0a0a; animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .right-spacer {
      flex: 1;
      min-width: 12px;
      height: 100%;
      -webkit-app-region: drag;
    }
  </style>
</head>
<body>
  <div class="drag-spacer"></div>
  <div class="tab-home active" id="home-tab" title="Workspaces" onclick="try{window.electronAPI.showSelector()}catch(e){}">
    <img src="clasifyre_icon.png" alt="" />
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="update-badge" id="update-badge"></div>
  <div class="right-spacer"></div>
</body>
</html>
