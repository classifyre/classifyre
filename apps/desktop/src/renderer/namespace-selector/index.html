<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Classifyre — Workspaces</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Classifyre</h1>
      <p class="subtitle">Select a workspace or create a new one</p>
    </header>

    <div id="namespace-list" class="namespace-list">
      <div class="loading">Loading workspaces…</div>
    </div>

    <div class="create-section">
      <input
        type="text"
        id="new-name"
        placeholder="New workspace name"
        maxlength="64"
        autocomplete="off"
      />
      <button id="create-btn" class="btn btn-primary">Create</button>
    </div>
  </div>

  <script src="renderer.js" type="module"></script>
</body>
</html>
