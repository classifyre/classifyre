# Source: classifyre-core/charts/seaweedfs/templates/s3/s3-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifyre-seaweedfs-s3
  namespace: classifyre-dev
  labels:
    app.kubernetes.io/name: seaweedfs
    helm.sh/chart: seaweedfs-4.0.413
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: classifyre
    app.kubernetes.io/component: s3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/instance: classifyre
      app.kubernetes.io/component: s3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        helm.sh/chart: seaweedfs-4.0.413
        app.kubernetes.io/instance: classifyre
        app.kubernetes.io/component: s3
      
      annotations:
      
    spec:
      restartPolicy: Always
      
      terminationGracePeriodSeconds: 10
      enableServiceLinks: false
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.13
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SEAWEEDFS_FULLNAME
              value: "classifyre-seaweedfs"
            - name: WEED_CLUSTER_DEFAULT
              value: "sw"
            - name: WEED_CLUSTER_SW_FILER
              value: "classifyre-seaweedfs-filer-client.classifyre-dev:8888"
            - name: WEED_CLUSTER_SW_MASTER
              value: "classifyre-seaweedfs-master.classifyre-dev:9333"
          command:
            - "/bin/sh"
            - "-ec"
            - |
              exec /usr/bin/weed \
              -logdir=/logs \
              -v=1 \
              s3 \
              -ip.bind=0.0.0.0 \
              -port=8333 \
              -metricsPort 9327 \
              -filer=classifyre-seaweedfs-filer-client.classifyre-dev:8888 \
          volumeMounts:
            - name: logs
              mountPath: "/logs/"
            
          ports:
            - containerPort: 8333
              name: swfs-s3
            - containerPort: 9327
              name: metrics
          readinessProbe:
            httpGet:
              path: /status
              port: 8333
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 100
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8333
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 20
            timeoutSeconds: 10
      volumes:
        - name: logs
          hostPath:
            path: /storage/logs/seaweedfs/s3
            type: DirectoryOrCreate
