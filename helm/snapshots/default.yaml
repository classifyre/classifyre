              value: "classifyre"
            - name: DB_USER
              value: "classifyre"
            - name: DB_SSLMODE
              value: "disable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: classifyre-db
                  key: password
            - name: CLASSIFYRE_MASKED_CONFIG_KEY
