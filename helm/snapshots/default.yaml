              drop:
              - ALL
          command:
            - /bin/sh
            - -lc
          args:
            - >-
              set -eu;
              if [ -d "/app/node_modules" ] && [ ! -e "/node_modules" ]; then
                ln -s /app/node_modules /node_modules;
              fi;
              if [ -z "${DATABASE_URL:-}" ] || [ "${DATABASE_URL}" = "postgresql://postgres@127.0.0.1:5432/classifyre" ]; then
                export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}";
              fi;
              npx prisma migrate deploy --schema /app/api/prisma/schema.prisma
          env:
            - name: DB_HOST
              value: ""
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "classifyre"
            - name: DB_USER
              value: "classifyre"
            - name: DB_SSLMODE
              value: "disable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: classifyre-db
                  key: password
            - name: CLASSIFYRE_MASKED_CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: classifyre-api-secrets
                  key: CLASSIFYRE_MASKED_CONFIG_KEY
