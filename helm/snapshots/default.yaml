apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: classifyre-seaweedfs-volume
  namespace: classifyre-dev
  labels:
    app.kubernetes.io/name: seaweedfs
    helm.sh/chart: seaweedfs-4.0.413
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: classifyre
    app.kubernetes.io/component: volume
spec:
  serviceName: classifyre-seaweedfs-volume
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/instance: classifyre
      app.kubernetes.io/component: volume
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        helm.sh/chart: seaweedfs-4.0.413
        app.kubernetes.io/instance: classifyre
        app.kubernetes.io/component: volume
      
      annotations:
      
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: seaweedfs
                  app.kubernetes.io/instance: classifyre
                  app.kubernetes.io/component: volume
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
      
      terminationGracePeriodSeconds: 150
      enableServiceLinks: false
      serviceAccountName: "seaweedfs" # for deleting statefulset pods after migration
      initContainers:
        - name: seaweedfs-vol-move-idx
          image: chrislusf/seaweedfs:4.13
          imagePullPolicy: IfNotPresent
          command: [ '/bin/sh', '-c' ]
          args: [ 'if ls /data/*.idx  >/dev/null 2>&1; then mv /data/*.idx /idx/ ; fi; ' ]
          volumeMounts:
            - name: idx
              mountPath: /idx
            - name: data
              mountPath: /data
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.13
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SEAWEEDFS_FULLNAME
              value: "classifyre-seaweedfs"
            - name: WEED_CLUSTER_DEFAULT
              value: "sw"
            - name: WEED_CLUSTER_SW_FILER
              value: "classifyre-seaweedfs-filer-client.classifyre-dev:8888"
            - name: WEED_CLUSTER_SW_MASTER
              value: "classifyre-seaweedfs-master.classifyre-dev:9333"
          command:
            - "/bin/sh"
            - "-ec"
            - |
              exec /usr/bin/weed \
                -logtostderr=true \
                -v=1 \
                volume \
                -port=8080 \
                -metricsPort=9327 \
                -dir /data \
                -dir.idx=/idx \
                -max 7 \
                -ip.bind=0.0.0.0 \
                -readMode=proxy \
                -minFreeSpacePercent=1 \
                -ip=${POD_NAME}.classifyre-seaweedfs-volume.classifyre-dev \
                -compactionMBps=50 \
