# Source: classifyre-core/templates/seaweedfs-init-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: classifyre-seaweedfs-init
  labels:
    app.kubernetes.io/name: classifyre
    helm.sh/chart: classifyre-core-0.2.35
    app.kubernetes.io/instance: classifyre
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: seaweedfs-init
  annotations:
    # Run this job on every install/upgrade so the bucket is always present.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: classifyre
        app.kubernetes.io/instance: classifyre
        app.kubernetes.io/component: seaweedfs-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -ec
            - |
              S3_HOST="http://classifyre-seaweedfs-s3.classifyre-dev.svc.cluster.local:8333"
              BUCKET="classifyre-logs"

              echo "Waiting for SeaweedFS S3 at ${S3_HOST}..."
              for i in $(seq 1 60); do
                if curl -fsS --max-time 3 "${S3_HOST}/" >/dev/null 2>&1 || \
                   curl -fsS --max-time 3 "${S3_HOST}/" 2>&1 | grep -q "NoSuchBucket\|AccessDenied\|ListBuckets"; then
                  break
                fi
                echo "  attempt ${i}/60 — not ready yet"
                sleep 5
              done

              echo "Creating bucket ${BUCKET}..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "${S3_HOST}/${BUCKET}" 2>&1)
              if echo "${HTTP_CODE}" | grep -qE "^(200|409)"; then
                echo "Bucket ${BUCKET} ready (HTTP ${HTTP_CODE})."
              else
                echo "Unexpected HTTP ${HTTP_CODE} creating bucket — continuing anyway."
              fi
              echo "SeaweedFS init complete."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
