    helm.sh/chart: classifyre-core-0.2.35
    app.kubernetes.io/instance: classifyre
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: classifyre
      app.kubernetes.io/instance: classifyre
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: classifyre
        app.kubernetes.io/instance: classifyre
        app.kubernetes.io/component: api
      annotations:
        checksum/cli-job-template: 3c5c7a794c2e0a45ce6643d95c2912787a4bd14befeb8812949b20ff0690998b
    spec:
      serviceAccountName: classifyre-api
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prisma-migrate
          image: classifyre/api:0.2.35
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          command:
            - /bin/sh
            - -lc
          args:
            - >-
              set -eu;
              if [ -d "/app/node_modules" ] && [ ! -e "/node_modules" ]; then
                ln -s /app/node_modules /node_modules;
              fi;
              if [ -z "${DATABASE_URL:-}" ] || [ "${DATABASE_URL}" = "postgresql://postgres@127.0.0.1:5432/classifyre" ]; then
                export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}";
              fi;
              npx prisma migrate deploy --schema /app/api/prisma/schema.prisma
          env:
            - name: DB_HOST
              value: "classifyre-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "classifyre"
            - name: DB_USER
              value: "postgres"
            - name: DB_SSLMODE
              value: "disable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: classifyre-db
                  key: password
            - name: CLASSIFYRE_MASKED_CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: classifyre-api-secrets
                  key: CLASSIFYRE_MASKED_CONFIG_KEY
      containers:
        - name: api
          image: classifyre/api:0.2.35
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - >-
              set -eu;
              if [ -d "/app/node_modules" ] && [ ! -e "/node_modules" ]; then
                ln -s /app/node_modules /node_modules;
              fi;
              if [ -z "${DATABASE_URL:-}" ] || [ "${DATABASE_URL}" = "postgresql://postgres@127.0.0.1:5432/classifyre" ]; then
                export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}";
              fi;
              exec node dist/src/main.js
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DB_HOST
              value: "classifyre-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "classifyre"
