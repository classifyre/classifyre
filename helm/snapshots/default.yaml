# Source: classifyre-core/templates/api-cli-cache-prune-cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: classifyre-cli-uv-cache-prune
  labels:
    app.kubernetes.io/name: classifyre
    helm.sh/chart: classifyre-core-0.4.57-SNAPSHOT
    app.kubernetes.io/instance: classifyre
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: cli-cache-prune
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: uv-cache
              persistentVolumeClaim:
                claimName: classifyre-cli-uv-cache
          containers:
            - name: prune
              image: classifyre/cli:0.4.57-SNAPSHOT
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -eu
                  echo "Cache size before:" && du -sh "$UV_CACHE_DIR" || true
                  SIZE_MB=$(du -sm "$UV_CACHE_DIR" 2>/dev/null | cut -f1)
                  SIZE_MB=${SIZE_MB:-0}
                  if [ "$SIZE_MB" -gt "$UV_CACHE_MAX_MB" ]; then
                    echo "Cache ${SIZE_MB}MB exceeds cap ${UV_CACHE_MAX_MB}MB -> uv cache clean (full bust)"
                    uv cache clean
                  else
                    echo "Cache ${SIZE_MB}MB within cap ${UV_CACHE_MAX_MB}MB -> uv cache prune (soft)"
                    uv cache prune
                  fi
                  echo "Cache size after:" && du -sh "$UV_CACHE_DIR" || true
              env:
                - name: UV_CACHE_DIR
                  value: "/cache/uv"
                - name: UV_CACHE_MAX_MB
                  value: "8000"
              volumeMounts:
                - name: uv-cache
                  mountPath: /cache/uv
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
