api:
  replicaCount: 1
  autoscaling:
    enabled: false

  image:
    repository: classifyre/all-in-one
    tag: dev
    pullPolicy: IfNotPresent

  workingDir: /app/api
  startCommand: node /app/api/dist/src/main.js

  migration:
    enabled: true
    script: prisma migrate deploy --schema /app/api/prisma/schema.prisma

  podSecurityContext: {}
  containerSecurityContext: {}

  cliJobs:
    enabled: true
    image:
      repository: classifyre/all-in-one
      tag: dev
      pullPolicy: IfNotPresent
    workDir: /app/apps/cli
    uvCache:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi

frontend:
  replicaCount: 1
  autoscaling:
    enabled: false

  image:
    repository: classifyre/all-in-one
    tag: dev
    pullPolicy: IfNotPresent

  startCommand: node /app/web/apps/web/server.js

  podSecurityContext: {}
  containerSecurityContext: {}

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    database: classifyre
    username: postgres
    password: postgres
    persistence:
      enabled: false

priorityClasses:
  create: false

networkPolicy:
  enabled: false

# ── Object storage (SeaweedFS, single-replica, small footprint) ───────────────
objectStorage:
  bucket: classifyre-logs

  seaweedfs:
    enabled: true
    s3Port: 8333
    # Credentials are auto-generated and stored in the classifyre-s3-credentials Secret.
    accessKeyId: ""
    secretAccessKey: ""

seaweedfs:
  master:
    replicas: 1
    data:
      type: "emptyDir"
    logs:
      type: "emptyDir"

  volume:
    replicas: 1
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: "5Gi"
        storageClass: ""
    idx:
      type: "emptyDir"

  filer:
    replicas: 1
    data:
      type: "emptyDir"

  s3:
    enabled: true
    port: 8333
    enableAuth: false
