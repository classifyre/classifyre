# VPS demo/test values
# Single-node K3s, no ingress, NodePort access for web only.
# API remains ClusterIP — Next.js proxies /api calls server-side.
# Access: https://demo.classifyre.com

api:
  image:
    repository: classifyre/api
    tag: "main"
    pullPolicy: Always

  env:
    DEMO_MODE: "false"
    # Backpressure strategy (see chart values `api.maxOldSpaceSizeMb`):
    #   * Heap guard: left at the chart default (85% of the JS heap cap). Now
    #     that the heap is raised to 1536 MB inside a 2Gi pod, the guard sheds
    #     ingestion (CLI 503 → retry, never lost) BEFORE V8 hard-crashes.
    #     Previously this was disabled because the old 1Gi/512 MB-heap pods sat
    #     permanently near the limit and the guard false-fired on every request.
    #   * RSS guard: still disabled — native onnxruntime/embedding memory makes
    #     RSS noisy, and the heap + event-loop signals cover the real failures.
    #   * Event-loop delay (2 s): fires only when Node is CPU-starved.
    # DB-level backpressure (P2028/P2034 → 503) is handled by PrismaExceptionFilter.
    UNDER_PRESSURE_MAX_RSS_BYTES: "0" # 0 = disabled
    UNDER_PRESSURE_MAX_EVENT_LOOP_DELAY: "2000" # 2 s event-loop lag = genuinely stuck

  # Single-node VPS: cap replicas so CLI jobs don't trigger runaway HPA scale-out.
  # 10 API pods on one node causes memory pressure → liveness probe failures →
  # RemoteDisconnected errors mid-request → asset failures.
  autoscaling:
    minReplicas: 2
    maxReplicas: 4

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "main"
      pullPolicy: Always

frontend:
  image:
    repository: classifyre/web
    tag: "main"
    pullPolicy: IfNotPresent
  posthog:
    enabled: true
    token: "phc_ocaaqUW6YaGFTFqKTvydnaEHmouSWnHnTuKuPQtjmfLe"
    host: "/classifyre-usr"
    uiHost: "https://eu.posthog.com"
    ingestHost: "https://eu.i.posthog.com"

  service:
    type: NodePort
    port: 3100
    nodePort: 30100

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    existingSecret: classifyre-postgres-password
    persistence:
      accessModes:
        - ReadWriteOnce

telemetry:
  enabled: true
  otlpEndpoint: "http://otel-receiver-opentelemetry-collector.monitoring:4318"

objectStorage:
  enabled: false
  bucket: classifyredemologs
  endpoint: "https://s3.us-west-002.backblazeb2.com"
  region: us-west-002
  forcePathStyle: false
  existingSecret: classifyre-s3-credentials
