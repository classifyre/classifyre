# VPS demo/test values
# Single-node K3s, no ingress, NodePort access for web only.
# API remains ClusterIP — Next.js proxies /api calls server-side.
# Access: https://demo.classifyre.com

api:
  replicaCount: 1

  image:
    repository: classifyre/api
    tag: "main"
    pullPolicy: Always

  # API image defaults to /app/api, which is required for Prisma config discovery.
  startCommand: node dist/src/main.js

  env:
    DEMO_MODE: "true"

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "main"
      pullPolicy: Always
    # Stamatatos06 / CLASSIFIER+ENTITY combos exhaust default 4Gi limit; bump to 6Gi.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 6Gi
    # local-path leaves these cache PVCs pending until a job consumes them, which
    # blocks `helm upgrade --wait` during deploy even though the app is healthy.
    uvCache:
      enabled: false

  migration:
    # Published API image currently keeps Prisma engine files under root-owned Bun modules.
    # Run only the migration init container as root; keep the main API container non-root.
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false

frontend:
  replicaCount: 1

  image:
    repository: classifyre/web
    tag: "main"
    pullPolicy: Always

  startCommand: node /app/apps/web/server.js

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  service:
    type: NodePort
    port: 3100
    nodePort: 30100

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    password: "classifyre-vps-demo"
    persistence:
      accessModes:
        - ReadWriteOnce

# ── Object storage (SeaweedFS, minimal footprint for VPS) ────────────────────
# local-path StorageClass on K3s only supports ReadWriteOnce; SeaweedFS volume
# uses a single ReadWriteOnce PVC so it works out of the box.
objectStorage:
  bucket: classifyre-logs
  seaweedfs:
    enabled: true

seaweedfs:
  volume:
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: "10Gi"
        storageClass: ""
