# VPS demo/test values
# Single-node K3s, no ingress, NodePort access for web only.
# API remains ClusterIP — Next.js proxies /api calls server-side.
# Access: https://demo.classifyre.com

api:
  image:
    repository: classifyre/api
    tag: "fix-deployment_cli"
    pullPolicy: Always

  env:
    DEMO_MODE: "false"
    # Single-node VPS: heap/RSS are always close to limits (pods idle at ~300 MB RSS).
    # Disable heap and RSS checks — they fire constantly and block all requests.
    # Only use event-loop delay (2 s) as the backpressure signal: it triggers
    # only when Node is CPU-starved and genuinely cannot process requests.
    # DB-level backpressure (P2028/P2034 → 503) is handled by PrismaExceptionFilter.
    UNDER_PRESSURE_MAX_HEAP_USED_BYTES: "0"   # 0 = disabled
    UNDER_PRESSURE_MAX_RSS_BYTES: "0"         # 0 = disabled
    UNDER_PRESSURE_MAX_EVENT_LOOP_DELAY: "2000"  # 2 s event-loop lag = genuinely stuck

  # Single-node VPS: cap replicas so CLI jobs don't trigger runaway HPA scale-out.
  # 10 API pods on one node causes memory pressure → liveness probe failures →
  # RemoteDisconnected errors mid-request → asset failures.
  autoscaling:
    minReplicas: 2
    maxReplicas: 4

  # Single-node VPS: mount the host directory that holds sandbox temp files and runner
  # logs so both the API pod and ephemeral CLI job pods can access the same path.
  # The directory is pre-created on the K3s node (owned by uid 10001) during initial setup.
  extraVolumeMounts:
    - name: classifyre-data
      mountPath: /var/lib/classifyre
  extraVolumes:
    - name: classifyre-data
      hostPath:
        path: /var/lib/classifyre
        type: DirectoryOrCreate

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "fix-deployment_cli"
      pullPolicy: Always
    # Share the same host directory with CLI job pods so sandbox input/detectors
    # files written by the API pod are readable by the ephemeral job pods.
    extraVolumeMounts:
      - name: classifyre-data
        mountPath: /var/lib/classifyre
    extraVolumes:
      - name: classifyre-data
        hostPath:
          path: /var/lib/classifyre
          type: DirectoryOrCreate


frontend:
  image:
    repository: classifyre/web
    tag: "fix-deployment_cli"
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    port: 3100
    nodePort: 30100

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    existingSecret: classifyre-postgres-password
    persistence:
      accessModes:
        - ReadWriteOnce

objectStorage:
  enabled: true
  bucket: classifyredemologs
  sandboxBucket: classifyredemosandbox
  endpoint: "https://s3.us-west-002.backblazeb2.com"
  region: us-west-002
  forcePathStyle: false
  existingSecret: classifyre-s3-credentials
