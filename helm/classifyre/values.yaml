# -- Override chart name used in resource names.
nameOverride: "classifyre"
# -- Fully override release-based resource names.
fullnameOverride: ""

# -- Additional labels added to all chart resources.
commonLabels: {}
# -- Additional annotations added to supported chart resources.
commonAnnotations: {}

# -- Image pull secrets for all workloads.
imagePullSecrets: []

serviceAccount:
  # -- Create the API service account.
  create: true
  # -- Existing service account name to use when `create=false`.
  name: ""
  # -- Extra annotations for the API service account.
  annotations: {}
  # -- Mount service account token into API pods (required for Kubernetes CLI jobs).
  automount: true

rbac:
  # -- Create Role/RoleBinding for API CLI job orchestration.
  create: true

api:
  # -- Number of API replicas when autoscaling is disabled.
  replicaCount: 2

  image:
    # -- API container image repository.
    repository: classifyre/api
    # -- API container image tag. Defaults to the chart appVersion when empty.
    tag: ""
    # -- API image pull policy.
    pullPolicy: IfNotPresent

  embedding:
    # -- Enable semantic embedding generation inside the API process.
    enabled: true
    # -- Embedding provider: transformers-js or openai-compatible.
    provider: transformers-js
    # -- Hugging Face model id or external provider model id.
    model: Xenova/all-MiniLM-L6-v2
    # -- Immutable model revision. Change it to create a new embedding space.
    revision: 751bff37182d3f1213fa05d7196b954e230abad9
    # -- Output dimensions. pgvector HNSW supports vector dimensions up to 2000.
    dimensions: 384
    pooling: mean
    normalize: true
    # -- Transformers.js ONNX precision and execution device.
    dtype: q8
    device: cpu
    allowRemoteModels: true
    # -- Optional local Transformers.js model root mounted into the API pod.
    localModelPath: ""
    cacheDir: /var/cache/classifyre/transformers
    cacheSizeLimit: 2Gi
    # -- Rows embedded per inference batch on the worker. Larger batches are
    # -- faster but hold more tensors in memory at once; keep this modest so a
    # -- backfill burst cannot spike the worker heap into an OOM.
    batchSize: 16
    retrySeconds: 30
    # -- Reconcile all stored findings and asset chunks into the configured
    # -- embedding space on API startup. Existing vectors are hash-skipped.
    autoBackfill: true
    # -- Maximum embedding batches processed concurrently across all API replicas.
    workerConcurrency: 1
    maxParallelCalls: 2
    hnsw:
      m: 16
      efConstruction: 64
      efSearch: 100
    external:
      # -- Base URL for an OpenAI-compatible embeddings API.
      baseUrl: ""
      # -- Existing secret containing the provider API key.
      existingSecret: ""
      apiKeyKey: api-key

  # -- Optional API container command override.
  command: []
  # -- Optional API container args override.
  args: []
  # -- Working directory used by default shell command.
  workingDir: ""
  # -- Default API process command when `command/args` are not set.
  startCommand: node dist/src/main.js

  # -- V8 old-space (JS heap) cap in MB, applied via NODE_OPTIONS
  # -- (`--max-old-space-size`) to both the API and worker deployments.
  # --
  # -- Node caps the old-space heap at ~512 MB by default regardless of the
  # -- container memory limit, so without this the process hits
  # -- `FATAL ERROR: JavaScript heap out of memory` and SIGSEGV-restarts long
  # -- before it uses the memory the pod was granted. Keep this comfortably
  # -- below `resources.limits.memory`: the container also holds native
  # -- allocations (Prisma, the transformers.js/onnxruntime embedding model,
  # -- Buffers) that live outside the V8 heap, so `heap + native` must fit the
  # -- limit. Rule of thumb: heap ≈ 0.75 × the memory limit (in MB).
  maxOldSpaceSizeMb: 1536

  # -- Additional pod labels for API deployment.
  podLabels: {}
  # -- Additional pod annotations for API deployment.
  podAnnotations: {}

  service:
    # -- API service type.
    type: ClusterIP
    # -- API service port.
    port: 8000
    # -- Fixed nodePort when `type` is `NodePort` or `LoadBalancer`.
    nodePort: null
    # -- Additional API service annotations.
    annotations: {}

  env:
    # -- Runtime environment passed to API container.
    NODE_ENV: production
    # -- API listen port.
    PORT: "8000"
    # -- Execution mode used by API.
    ENVIRONMENT: kubernetes
    # -- Temporary directory used by API.
    TEMP_DIR: /tmp
    # -- Filesystem directory for runner execution logs (filesystem backend only; unused when S3 is configured).
    RUNNER_LOGS_DIR: /var/lib/classifyre/runner-logs
    # -- Maximum number of completed/failed runs to keep per source. Older runs are
    # -- deleted (including their logs) when a new run is triggered and the count
    # -- exceeds this value. Set to "0" to disable cleanup.
    MAX_RUNNERS_PER_SOURCE: "5"
    # -- Maximum number of runners that can execute concurrently across all sources.
    # -- New runs are queued in PENDING state when this limit is reached.
    # -- Set to "0" to disable the limit (unlimited concurrency).
    MAX_CONCURRENT_RUNNERS: "3"
    # -- Enable read-only demo mode. When "true" all mutating API operations return 403.
    DEMO_MODE: "false"

  maskedConfigEncryption:
    # -- Existing secret name that contains API masked-config encryption key.
    # -- When set, chart will not create or manage this secret.
    existingSecret: ""
    # -- Secret name created by this chart when existingSecret is empty.
    secretName: ""
    # -- Secret key name used for CLASSIFYRE_MASKED_CONFIG_KEY.
    secretKey: CLASSIFYRE_MASKED_CONFIG_KEY
    # -- Explicit encryption key value to store in chart-managed secret.
    # -- Must be exactly 32 chars when using raw string format.
    value: ""
    # -- Generate a random 32-character key when value is empty.
    # -- Generated key is persisted via Kubernetes Secret lookup across upgrades.
    autoGenerate: true

  # -- Extra environment variables for API container.
  extraEnv: []
  # -- Extra envFrom sources for API container.
  extraEnvFrom: []
  # -- Extra volume mounts for the API container.
  extraVolumeMounts: []
  # -- Extra volumes for the API pod.
  extraVolumes: []

  resources:
    # -- API resource requests.
    requests:
      cpu: 250m
      memory: 768Mi
    # -- API resource limits. Must leave headroom above `maxOldSpaceSizeMb`
    # -- (the JS heap) for native allocations — Prisma, the embedding model,
    # -- and Buffers all live outside the V8 heap. With a 1536 MB heap, 2Gi
    # -- leaves ~512 MB for native memory before the kernel OOM-kills the pod.
    limits:
      cpu: "1"
      memory: 2Gi

  # -- API scheduling: node selector.
  nodeSelector: {}
  # -- API scheduling: tolerations.
  tolerations: []
  # -- API scheduling: affinity rules. When empty, default soft anti-affinity is applied.
  affinity: {}
  # -- API topology spread constraints. When empty, a default hostname spread is applied.
  topologySpreadConstraints: []
  # -- API pod priority class.
  priorityClassName: ""
  # -- API pod termination grace period (seconds). Set to null to use Kubernetes default.
  terminationGracePeriodSeconds: null
  # -- API deployment strategy override.
  strategy: {}
  # -- Lifecycle hooks for the API container. The default preStop delay avoids dropped connections
  # -- during rolling updates by giving kube-proxy time to drain in-flight requests.
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 5"]

  podSecurityContext:
    # -- Require API container to run as non-root.
    runAsNonRoot: true
    # -- API pod user ID.
    runAsUser: 10001
    # -- API pod group ID.
    runAsGroup: 10001
    # -- API fsGroup for mounted volumes.
    fsGroup: 10001
    seccompProfile:
      # -- API pod seccomp profile type.
      type: RuntimeDefault

  containerSecurityContext:
    # -- Disallow privilege escalation in API container.
    allowPrivilegeEscalation: false
    # -- Keep root filesystem writable. Enable only after mounting emptyDir volumes over every
    # -- path the app writes to at runtime (e.g. /tmp, log dirs). Hardening step for advanced users.
    readOnlyRootFilesystem: false
    capabilities:
      # -- Drop all Linux capabilities in API container.
      drop:
        - ALL

  livenessProbe:
    # -- Enable API liveness probe.
    enabled: true
    # -- HTTP path for API liveness probe.
    path: /ping
    # -- Delay before starting API liveness checks.
    initialDelaySeconds: 30
    # -- API liveness check period.
    periodSeconds: 15
    # -- API liveness check timeout.
    timeoutSeconds: 5
    # -- API liveness failure threshold.
    failureThreshold: 6

  readinessProbe:
    # -- Enable API readiness probe.
    enabled: true
    # -- HTTP path for API readiness probe.
    path: /ping
    # -- Delay before starting API readiness checks.
    initialDelaySeconds: 10
    # -- API readiness check period.
    periodSeconds: 10
    # -- API readiness check timeout.
    timeoutSeconds: 3
    # -- API readiness failure threshold.
    failureThreshold: 6

  startupProbe:
    # -- Enable API startup probe.
    enabled: true
    # -- HTTP path for API startup probe.
    path: /ping
    # -- API startup check period.
    periodSeconds: 10
    # -- API startup check timeout.
    timeoutSeconds: 3
    # -- API startup failure threshold.
    failureThreshold: 30

  autoscaling:
    # -- Enable HPA for API deployment.
    enabled: true
    # -- Minimum API replicas under HPA.
    minReplicas: 2
    # -- Maximum API replicas under HPA.
    maxReplicas: 10
    # -- Target average CPU utilization for API HPA.
    targetCPUUtilizationPercentage: 70
    # -- Target average memory utilization for API HPA.
    targetMemoryUtilizationPercentage: 75

  pdb:
    # -- Enable PodDisruptionBudget for API deployment.
    enabled: true
    # -- API minimum pods available during disruptions.
    minAvailable: 1

  migration:
    # -- Run database migrations as an API init container. When disabled, the
    # -- API applies pending migrations itself before NestJS startup.
    enabled: true
    # -- Migration command/script.
    script: npx prisma migrate deploy --schema /app/api/prisma/schema.prisma
    # -- Security context for the migration init container.
    # -- Override with runAsUser/runAsNonRoot: false if the migration toolchain requires root (e.g. Prisma on Bun).
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

  cliJobs:
    # -- Enable Kubernetes-backed CLI jobs.
    enabled: true
    # -- Namespace used for CLI jobs. Empty means release namespace.
    namespace: ""

    image:
      # -- CLI job image repository.
      repository: classifyre/cli
      # -- CLI job image tag. Defaults to the chart appVersion when empty.
      tag: ""
      # -- CLI job image pull policy.
      pullPolicy: IfNotPresent

    # -- Service account for CLI jobs. Empty uses API service account.
    serviceAccountName: ""
    # -- CA bundle the API/worker trusts when calling the in-cluster Kubernetes
    # API to create/delete CLI Jobs. The kube-apiserver serves a cert signed by
    # the cluster CA, which every pod mounts at this path; exposing it via
    # NODE_EXTRA_CA_CERTS makes Node's TLS trust it (fixes the
    # SELF_SIGNED_CERT_IN_CHAIN error against self-signed clusters like k3d).
    # Set to "" to disable (e.g. if the cluster CA is already in the system store).
    kubeApiCaCertPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    # -- Retry attempts for failed CLI jobs.
    backoffLimit: 2
    # -- Max runtime per CLI job (seconds). Increase for large data sources.
    activeDeadlineSeconds: 86400
    # -- TTL for completed CLI jobs (seconds). Ignored when cleanup policy deletes jobs immediately.
    ttlSecondsAfterFinished: 1800
    # -- Cleanup policy for CLI jobs: none, failed, or always.
    cleanupPolicy: always
    # -- Max time API waits for job completion (seconds). Should exceed activeDeadlineSeconds.
    waitTimeoutSeconds: 87300
    # -- Poll interval while waiting for job completion (milliseconds).
    pollIntervalMs: 2000
    # -- Working directory inside CLI job container.
    workDir: /app/apps/cli
    # -- Allow CLI to auto-install optional detector dependencies at runtime.
    # -- The slim cli image installs detector/source groups on demand into a
    # -- per-pod venv; concurrent/interrupted syncs are made safe by the file
    # -- lock + cross-process group accumulation + self-heal in uv_sync.py.
    autoInstallOptionalDeps: true
    # -- Number of detector-processed assets to accumulate before pushing findings to the API.
    detectorFlushBatchSize: 5
    # -- HTTP read timeout (seconds) for CLI→API REST calls (bulk ingest, finalize, status updates).
    # The API processes each batch in a Postgres transaction that can take 30-60 s under load;
    # this must be set higher than the API's transaction timeout to avoid spurious read-timeout failures.
    outputRestTimeoutSec: 120
    # -- Optional override for the auto-scaled process pool size (1-16).
    # When unset, the pool auto-sizes from cgroup CPU/memory limits.
    # maxPoolWorkers:

    resources:
      # -- CLI job resource requests.
      requests:
        cpu: 500m
        # Detector workers hold ML models permanently (one copy per worker) and
        # discovery keeps the full asset list in memory, so real usage sits close
        # to the limit. A 1Gi request against a 4Gi limit made these pods prime
        # node-pressure eviction targets mid-scan; requesting near the limit keeps
        # the scheduler honest and lets long scans finish.
        memory: 3Gi
        # CLI containers routinely use 5-6 Gi (uv package downloads, pip wheels,
        # extracted asset temp files). Requesting 6 Gi matches real usage so the
        # scheduler only places jobs on nodes with enough disk and kubelet does not
        # rank them as high-priority eviction candidates under node disk pressure.
        ephemeral-storage: 6Gi
      # -- CLI job resource limits.
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 20Gi

    # -- CLI job scheduling: node selector.
    nodeSelector: {}
    # -- CLI job scheduling: tolerations.
    tolerations: []
    # -- CLI job scheduling: affinity rules.
    affinity: {}
    # -- CLI job priority class.
    priorityClassName: ""
    # -- Mount service account token into CLI job pods.
    automountServiceAccountToken: false
    # -- Pod security context for CLI job pods.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      # fsGroup ensures Kubernetes pre-chowns mounted PVCs (uv-cache, runner-logs)
      # to GID 10001 so the non-root container can write to them on fresh installs.
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    # -- Container security context for CLI job container.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL

    huggingFace:
      # -- Name of an existing Kubernetes Secret containing the Hugging Face
      # authentication token (HF_TOKEN). When set, the token is injected into
      # every CLI job pod via a secretKeyRef env var. This authenticates requests
      # to hf.co, which significantly increases download rate limits and avoids
      # the "unauthenticated requests" warning from the huggingface-hub library.
      #
      # When this value is set, the Hugging Face token field in the web UI
      # Settings page becomes read-only and disabled — the instance-level token
      # always takes priority over any user-configured token.
      #
      # Create the Secret manually (or via your preferred tool — SealedSecrets,
      # External Secrets, SOPS, etc.) in the same namespace as the CLI jobs:
      #
      #   kubectl create secret generic hf-token \
      #     --from-literal=token=hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      #
      # The chart does NOT create or manage this Secret — you must create it
      # yourself. This keeps the token out of Helm state and lets you rotate
      # it independently of Helm releases.
      existingSecret: ""
      # -- Key inside existingSecret that holds the HF_TOKEN value.
      existingKey: token

    # -- Additional environment variables for CLI jobs (list of EnvVar objects; supports secretKeyRef etc.).
    extraEnv: []
    # -- Extra volume mounts for CLI job containers.
    extraVolumeMounts: []
    # -- Extra volumes for CLI job pods.
    extraVolumes: []

    uvCache:
      # -- Enable shared PVC for uv cache (pip package cache shared across CLI jobs).
      enabled: true
      # -- Mount path for uv cache in CLI job container.
      mountPath: /cache/uv
      # -- Existing PVC name for uv cache. Empty creates a new PVC.
      existingClaim: ""
      # -- Storage class for uv cache PVC.
      storageClassName: ""
      # -- Access modes for uv cache PVC. ReadWriteOnce works on any standard StorageClass.
      # -- Use ReadWriteMany only if your cluster has a shared filesystem StorageClass (e.g. EFS, NFS).
      accessModes:
        - ReadWriteOnce
      # -- Requested size for uv cache PVC.
      # -- IMPORTANT: ReadWriteOnce (default) only works on single-node clusters or when all CLI
      # -- jobs are guaranteed to land on the same node. On multi-node clusters with concurrent
      # -- jobs, set accessModes: [ReadWriteMany] and use a shared StorageClass (EFS, NFS, etc.)
      # -- to avoid jobs hanging with "Multi-Attach error" when two jobs land on different nodes.
      size: 10Gi
      prune:
        # -- Enable a CronJob that keeps the uv cache bounded on a schedule.
        enabled: true
        # -- Cron schedule for cache pruning. Default: daily at 02:00.
        # -- `uv cache prune` alone only evicts *unreferenced* entries, so a cache
        # -- holding many large dependency groups (e.g. ML/LLM extras) grows unbounded.
        # -- The job hard-clears the cache once it exceeds `maxMB` (see below).
        schedule: "0 2 * * *"
        # -- Hard size cap (MiB). When the cache exceeds this, the job runs
        # -- `uv cache clean` (full bust; wheels re-download on next job) instead of
        # -- the soft `uv cache prune`. Keep below the PVC `size` above.
        maxMB: 8000
        # -- Image used by the prune CronJob (defaults to the CLI job image).
        image: ""
        # -- TTL for completed prune jobs (seconds).
        ttlSecondsAfterFinished: 3600

worker:
  # -- Number of worker replicas. The worker runs the same image as the API
  # -- (SERVICE_ROLE=worker) to process background pg-boss queue jobs and
  # -- embedding inference outside the HTTP-serving api pods, so heavy
  # -- background work no longer competes with api pods for their memory limit.
  replicaCount: 1

  resources:
    # -- Worker resource requests.
    requests:
      cpu: 100m
      memory: 512Mi
    # -- Worker resource limits.
    limits:
      cpu: "1"
      memory: 2Gi

frontend:
  # -- Number of web replicas when autoscaling is disabled.
  replicaCount: 2

  image:
    # -- Web container image repository.
    repository: classifyre/web
    # -- Web container image tag. Defaults to the chart appVersion when empty.
    tag: ""
    # -- Web image pull policy.
    pullPolicy: IfNotPresent

  # -- Optional web container command override.
  command: []
  # -- Optional web container args override.
  args: []
  # -- Default web process command when `command/args` are not set.
  startCommand: node /app/apps/web/server.js

  # -- Additional pod labels for web deployment.
  podLabels: {}
  # -- Additional pod annotations for web deployment.
  podAnnotations: {}

  service:
    # -- Web service type.
    type: ClusterIP
    # -- Web service port.
    port: 3100
    # -- Fixed nodePort when `type` is `NodePort` or `LoadBalancer`.
    nodePort: null
    # -- Additional web service annotations.
    annotations: {}

  env:
    # -- Runtime environment passed to web container.
    NODE_ENV: production
    # -- Web listen port.
    PORT: "3100"
    # -- Bind address for Next.js standalone server.
    HOSTNAME: 0.0.0.0
    # -- Browser-side API base path.
    NEXT_PUBLIC_API_URL: /api

  posthog:
    # -- Enable PostHog analytics. When false, no env vars are injected.
    enabled: false
    # -- PostHog project token (phc_...). Required when enabled=true.
    token: ""
    # -- Client-side ingest host sent to the browser SDK (NEXT_PUBLIC_POSTHOG_HOST).
    # -- Defaults to /classifyre-usr so requests are proxied through the web
    # -- container, bypassing ad-blockers. Override with a managed reverse proxy
    # -- subdomain (e.g. https://e.yourcompany.com) for extra reliability.
    host: "/classifyre-usr"
    # -- PostHog UI host for toolbar links etc. (NEXT_PUBLIC_POSTHOG_UI_HOST).
    # -- Use https://eu.posthog.com for EU Cloud.
    uiHost: "https://us.posthog.com"
    # -- Upstream PostHog ingest endpoint used server-side by the proxy route
    # -- (POSTHOG_INGEST_HOST). Never exposed to the browser.
    # -- Use https://eu.i.posthog.com for EU Cloud, or your managed proxy CNAME.
    ingestHost: "https://us.i.posthog.com"

  # -- Extra environment variables for web container.
  extraEnv: []
  # -- Extra envFrom sources for web container.
  extraEnvFrom: []
  # -- Extra volume mounts for the web container.
  extraVolumeMounts: []
  # -- Extra volumes for the web pod.
  extraVolumes: []

  resources:
    # -- Web resource requests.
    requests:
      cpu: 200m
      memory: 384Mi
    # -- Web resource limits.
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Web scheduling: node selector.
  nodeSelector: {}
  # -- Web scheduling: tolerations.
  tolerations: []
  # -- Web scheduling: affinity rules. When empty, default soft anti-affinity is applied.
  affinity: {}
  # -- Web topology spread constraints. When empty, a default hostname spread is applied.
  topologySpreadConstraints: []
  # -- Web pod priority class.
  priorityClassName: ""
  # -- Web pod termination grace period (seconds). Set to null to use Kubernetes default.
  terminationGracePeriodSeconds: null
  # -- Web deployment strategy override.
  strategy: {}
  # -- Lifecycle hooks for the web container.
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 5"]

  podSecurityContext:
    # -- Require web container to run as non-root.
    runAsNonRoot: true
    # -- Web pod user ID.
    runAsUser: 10001
    # -- Web pod group ID.
    runAsGroup: 10001
    # -- Web fsGroup for mounted volumes.
    fsGroup: 10001
    seccompProfile:
      # -- Web pod seccomp profile type.
      type: RuntimeDefault

  containerSecurityContext:
    # -- Disallow privilege escalation in web container.
    allowPrivilegeEscalation: false
    # -- Keep root filesystem writable. Enable only after mounting emptyDir volumes over every
    # -- path the app writes to at runtime. Hardening step for advanced users.
    readOnlyRootFilesystem: false
    capabilities:
      # -- Drop all Linux capabilities in web container.
      drop:
        - ALL

  livenessProbe:
    # -- Enable web liveness probe.
    enabled: true
    # -- HTTP path for web liveness probe.
    path: /
    # -- Delay before starting web liveness checks.
    initialDelaySeconds: 30
    # -- Web liveness check period.
    periodSeconds: 15
    # -- Web liveness check timeout.
    timeoutSeconds: 5
    # -- Web liveness failure threshold.
    failureThreshold: 6

  readinessProbe:
    # -- Enable web readiness probe.
    enabled: true
    # -- HTTP path for web readiness probe.
    path: /
    # -- Delay before starting web readiness checks.
    initialDelaySeconds: 10
    # -- Web readiness check period.
    periodSeconds: 10
    # -- Web readiness check timeout.
    timeoutSeconds: 3
    # -- Web readiness failure threshold.
    failureThreshold: 6

  startupProbe:
    # -- Enable web startup probe.
    enabled: true
    # -- HTTP path for web startup probe.
    path: /
    # -- Web startup check period.
    periodSeconds: 10
    # -- Web startup check timeout.
    timeoutSeconds: 3
    # -- Web startup failure threshold.
    failureThreshold: 30

  autoscaling:
    # -- Enable HPA for web deployment.
    enabled: true
    # -- Minimum web replicas under HPA.
    minReplicas: 2
    # -- Maximum web replicas under HPA.
    maxReplicas: 10
    # -- Target average CPU utilization for web HPA.
    targetCPUUtilizationPercentage: 70
    # -- Target average memory utilization for web HPA.
    targetMemoryUtilizationPercentage: 75

  pdb:
    # -- Enable PodDisruptionBudget for web deployment.
    enabled: true
    # -- Web minimum pods available during disruptions.
    minAvailable: 1

ingress:
  # -- Enable ingress resources for web/api/socket routes.
  enabled: false
  # -- Ingress class name.
  className: nginx
  # -- Shared ingress annotations (nginx-specific rewrite annotations are applied to API ingress automatically).
  annotations: {}
  # -- Hostname for all ingress rules. Required when ingress.enabled=true.
  host: ""
  # -- TLS configuration for ingress.
  tls: []

postgres:
  # -- PostgreSQL mode: external, cnpg, or embedded.
  mode: embedded

  connection:
    # -- sslmode used by API when connecting to PostgreSQL (`disable`, `require`, `verify-ca`, `verify-full`).
    sslMode: disable

  embedded:
    # -- Additional labels for embedded Postgres pod.
    podLabels: {}
    # -- Additional annotations for embedded Postgres pod.
    podAnnotations: {}
    service:
      # -- Additional annotations for embedded Postgres service.
      annotations: {}
    image:
      # -- Embedded Postgres image repository.
      repository: pgvector/pgvector
      # -- Embedded Postgres image tag.
      tag: "0.8.5-pg18-bookworm"
      # -- Embedded Postgres image pull policy.
      pullPolicy: IfNotPresent
    # -- Embedded Postgres service and container port.
    port: 5432
    # -- Embedded Postgres database name.
    database: classifyre
    # -- Embedded Postgres user name.
    username: postgres
    # -- Embedded Postgres password (required when existingSecret is empty).
    password: ""
    # -- Existing secret name holding embedded Postgres password.
    existingSecret: ""
    # -- Secret key name for embedded Postgres password.
    existingSecretPasswordKey: password
    # -- Embedded Postgres scheduling: node selector.
    nodeSelector: {}
    # -- Embedded Postgres scheduling: tolerations.
    tolerations: []
    # -- Embedded Postgres scheduling: affinity rules.
    affinity: {}
    # -- Embedded Postgres pod priority class.
    priorityClassName: ""
    # -- Embedded Postgres pod termination grace period (seconds). Set to null to use Kubernetes default.
    terminationGracePeriodSeconds: null
    # -- Embedded Postgres pod security context.
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
      # postgres image entrypoint skips chmod when already running as the postgres user (uid 999).
      # fsGroup ensures Kubernetes pre-chowns the PVC to GID 999 before the container starts.
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
    # -- Embedded Postgres container security context.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    persistence:
      # -- Enable persistent volume for embedded Postgres data.
      enabled: true
      # -- Existing PVC name for embedded Postgres data.
      existingClaim: ""
      # -- Storage class for embedded Postgres PVC.
      storageClassName: ""
      # -- Access modes for embedded Postgres PVC.
      accessModes:
        - ReadWriteOnce
      # -- Requested size for embedded Postgres PVC.
      size: 20Gi
    # -- postgresql.conf parameters passed to the server as `-c key=value` container
    # -- args. Tune these for the workload rather than raising Postgres resource
    # -- limits (see postgres.embedded.resources) — shared_buffers/work_mem control
    # -- how Postgres itself uses the memory already granted to it.
    parameters:
      shared_buffers: 512MB
      work_mem: 16MB
    resources:
      # -- Embedded Postgres resource requests.
      requests:
        cpu: 100m
        memory: 256Mi
      # -- Embedded Postgres resource limits.
      limits:
        cpu: "2"
        memory: 4Gi

  external:
    # -- External Postgres host.
    host: ""
    # -- External Postgres port.
    port: 5432
    # -- External Postgres database name.
    database: classifyre
    # -- External Postgres user name.
    username: classifyre
    # -- Deprecated: use `postgres.connection.sslMode` instead.
    sslMode: disable
    # -- Existing secret name for external Postgres credentials.
    existingSecret: ""
    # -- Optional secret key containing full DATABASE_URL.
    existingSecretUrlKey: ""
    # -- Secret key name for external Postgres password.
    existingSecretPasswordKey: password
    # -- External Postgres password (required when existingSecret is empty).
    password: ""

  cnpg:
    # -- CloudNativePG cluster resource name.
    clusterName: classifyre-cnpg
    # -- Number of CNPG instances.
    instances: 3
    # -- CNPG Postgres image.
    imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
    # -- Database bootstrapped by CNPG.
    database: classifyre
    # -- Owner user bootstrapped by CNPG.
    user: classifyre
    # -- Application password for generated CNPG secret.
    appPassword: ""
    # -- Existing CNPG superuser secret name.
    superuserSecretName: ""
    # -- Existing CNPG app secret name.
    bootstrapSecretName: ""
    storage:
      # -- CNPG storage size per instance.
      size: 20Gi
      # -- CNPG storage class name.
      storageClassName: ""
    postgresql:
      # -- postgresql.conf parameters merged into the CNPG Cluster's
      # -- `spec.postgresql.parameters`. Tune these for the workload rather than
      # -- raising CNPG resource limits — shared_buffers/work_mem control how
      # -- Postgres itself uses the memory already granted to each instance.
      parameters:
        shared_buffers: 512MB
        work_mem: 16MB

networkPolicy:
  # -- Enable network policies for API and web pods.
  enabled: false
  # -- Namespace selector allowed to reach API/web when network policy is enabled.
  ingressNamespaceSelector: {}

priorityClasses:
  # -- Create service and batch priority classes.
  create: false
  # -- Priority class name for service workloads.
  serviceName: service-standard
  # -- Numeric priority value for service workloads.
  serviceValue: 10000
  # -- Priority class name for batch workloads.
  batchName: batch-low-priority
  # -- Numeric priority value for batch workloads.
  batchValue: 1000

telemetry:
  # -- Enable OpenTelemetry instrumentation for API, web, and CLI components.
  # -- Disabled by default. When enabled, traces/metrics/logs are exported
  # -- via OTLP to telemetry.otlpEndpoint.
  # -- Opt out (already default): set enabled=false, or set TELEMETRY_DISABLED=1 / DO_NOT_TRACK=1 at runtime.
  enabled: false

  # -- OTLP endpoint all components export to (traces, metrics, logs).
  # -- Required when telemetry.enabled=true. Deploy helm/otel-receiver in your
  # -- own cluster and point at it, e.g.:
  # --   otlpEndpoint: "http://otel-receiver-opentelemetry-collector.monitoring:4318"
  otlpEndpoint: ""

  # -- OTLP export protocol: "http/protobuf" (default) or "grpc".
  otlpProtocol: "http/protobuf"

  # -- Deployment environment tag attached to every span/metric/log.
  deployEnv: "production"

  instanceId:
    # -- Persist a stable anonymous instance UUID in a ConfigMap so it survives upgrades.
    enabled: true
    # -- Use an existing ConfigMap instead of creating one. Must contain instanceId.configMapKey.
    existingConfigMap: ""
    # -- Key inside the ConfigMap that holds the UUID string.
    configMapKey: instance-id

# ── Object Storage (S3-compatible) ───────────────────────────────────────────
# When disabled (default), runner logs stream live but are not persisted.
# Users see an in-app warning. Enable and configure any S3-compatible provider.
#
# Examples:
#   AWS S3:       endpoint: ""  region: us-east-1  forcePathStyle: false
#   Backblaze B2: endpoint: https://s3.us-west-004.backblazeb2.com
#   MinIO:        endpoint: http://minio:9000  forcePathStyle: true
#   Garage:       endpoint: http://garage:3900  forcePathStyle: true
objectStorage:
  # -- Set to true to enable S3-compatible object storage.
  enabled: false
  # -- S3 bucket used for runner logs.
  bucket: classifyre-logs
  # -- S3 object key prefix for runner logs.
  logPrefix: "runner-logs/"
  # -- AWS region. Required for AWS S3; ignored by most self-hosted providers.
  region: us-east-1
  # -- S3 endpoint URL. Leave empty for AWS S3 (SDK auto-resolves). Required for all other providers.
  endpoint: ""
  # -- Force path-style S3 URLs. Required for MinIO, Garage, Backblaze B2, and most non-AWS providers.
  forcePathStyle: false
  # -- Inline access key ID. Prefer existingSecret for production.
  accessKeyId: ""
  # -- Inline secret access key. Prefer existingSecret for production.
  secretAccessKey: ""
  # -- Name of a pre-created Kubernetes Secret with S3 credentials. When set, accessKeyId/secretAccessKey are ignored.
  existingSecret: ""
  # -- Key inside existingSecret that holds the access key ID.
  existingSecretAccessKeyIdKey: access-key-id
  # -- Key inside existingSecret that holds the secret access key.
  existingSecretSecretAccessKeyKey: secret-access-key
