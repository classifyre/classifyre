# VPS develop values
# Same single-node K3s setup as values-vps.yaml, but deployed to the
# classifyre-develop namespace on NodePort 30101 with :develop image tags.
# Access: https://staging.classifyre.com/

api:
  image:
    repository: classifyre/api
    tag: "develop"
    pullPolicy: Always

  env:
    DEMO_MODE: "false"
    MAX_CONCURRENT_RUNNERS: "1"

  # Single-node VPS: minimal footprint.
  autoscaling:
    minReplicas: 1
    maxReplicas: 1

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "develop"
      pullPolicy: Always
    runnerLogs:
      accessModes:
        - ReadWriteOnce


frontend:
  image:
    repository: classifyre/web
    tag: "develop"
    pullPolicy: Always

  autoscaling:
    minReplicas: 1
    maxReplicas: 1

  service:
    type: NodePort
    port: 3100
    nodePort: 30101

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    existingSecret: classifyre-develop-postgres-credentials
    persistence:
      accessModes:
        - ReadWriteOnce

objectStorage:
  enabled: false
