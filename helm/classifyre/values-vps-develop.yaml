# VPS develop values
# Same single-node K3s setup as values-vps.yaml, but deployed to the
# classifyre-develop namespace on NodePort 30101 with :develop image tags.
# Access: https://staging.classifyre.com/

api:
  replicaCount: 1

  image:
    repository: classifyre/api
    tag: "develop"
    pullPolicy: Always

  startCommand: node dist/src/main.js

  env:
    DEMO_MODE: "false"

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "develop"
      pullPolicy: Always
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 15Gi
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 20Gi
    uvCache:
      enabled: true
      size: 30Gi
      accessModes:
        - ReadWriteOnce
  runnerLogs:
    accessModes:
      - ReadWriteOnce

  migration:
    # Published API image currently keeps Prisma engine files under root-owned Bun modules.
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false

frontend:
  replicaCount: 1

  image:
    repository: classifyre/web
    tag: "develop"
    pullPolicy: Always

  startCommand: node /app/apps/web/server.js

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  service:
    type: NodePort
    port: 3100
    nodePort: 30101

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    password: "classifyre-vps-develop"
    persistence:
      accessModes:
        - ReadWriteOnce

# Use a PVC for SeaweedFS idx so index files survive pod recreation.
# Without this, EmptyDir wipes idx files on every Helm upgrade, causing CrashLoopBackOff.
seaweedfs:
  volume:
    idx:
      type: "persistentVolumeClaim"
      size: "5Gi"
      storageClass: ""
