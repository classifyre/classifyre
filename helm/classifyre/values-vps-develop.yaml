# VPS develop values
# Same single-node K3s setup as values-vps.yaml, but deployed to the
# classifyre-develop namespace on NodePort 30101 with :develop image tags.
# Access: https://staging.classifyre.com/

api:
  replicaCount: 1

  image:
    repository: classifyre/api
    tag: "develop"
    pullPolicy: Always

  startCommand: node dist/src/main.js

  env:
    DEMO_MODE: "true"

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "develop"
      pullPolicy: Always
    # local-path leaves these cache PVCs pending until a job consumes them, which
    # blocks `helm upgrade --wait` during deploy even though the app is healthy.
    uvCache:
      enabled: false

  migration:
    # Published API image currently keeps Prisma engine files under root-owned Bun modules.
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false

frontend:
  replicaCount: 1

  image:
    repository: classifyre/web
    tag: "develop"
    pullPolicy: Always

  startCommand: node /app/apps/web/server.js

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  service:
    type: NodePort
    port: 3100
    nodePort: 30101

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    password: "classifyre-vps-develop"
    persistence:
      accessModes:
        - ReadWriteOnce

objectStorage:
  bucket: classifyre-logs
  seaweedfs:
    enabled: true

seaweedfs:
  volume:
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: "10Gi"
        storageClass: ""
