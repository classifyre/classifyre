{{- if and .Values.api.cliJobs.enabled .Values.api.cliJobs.uvCache.enabled .Values.api.cliJobs.uvCache.prune.enabled }}
{{- $pruneImage := .Values.api.cliJobs.uvCache.prune.image | default (printf "%s:%s" .Values.api.cliJobs.image.repository (.Values.api.cliJobs.image.tag | default .Chart.AppVersion)) }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-cli-uv-cache-prune" (include "classifyre.fullname" .) }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: cli-cache-prune
spec:
  schedule: {{ .Values.api.cliJobs.uvCache.prune.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.api.cliJobs.uvCache.prune.ttlSecondsAfterFinished }}
      template:
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: uv-cache
              persistentVolumeClaim:
                claimName: {{ .Values.api.cliJobs.uvCache.existingClaim | default (printf "%s-cli-uv-cache" (include "classifyre.fullname" .)) }}
          containers:
            - name: prune
              image: {{ $pruneImage }}
              imagePullPolicy: {{ .Values.api.cliJobs.image.pullPolicy }}
              command:
                - sh
                - -c
                - |
                  set -eu
                  echo "Cache size before:" && du -sh "$UV_CACHE_DIR" || true
                  SIZE_MB=$(du -sm "$UV_CACHE_DIR" 2>/dev/null | cut -f1)
                  SIZE_MB=${SIZE_MB:-0}
                  if [ "$SIZE_MB" -gt "$UV_CACHE_MAX_MB" ]; then
                    echo "Cache ${SIZE_MB}MB exceeds cap ${UV_CACHE_MAX_MB}MB -> uv cache clean (full bust)"
                    uv cache clean
                  else
                    echo "Cache ${SIZE_MB}MB within cap ${UV_CACHE_MAX_MB}MB -> uv cache prune (soft)"
                    uv cache prune
                  fi
                  echo "Cache size after:" && du -sh "$UV_CACHE_DIR" || true
              env:
                - name: UV_CACHE_DIR
                  value: {{ .Values.api.cliJobs.uvCache.mountPath | quote }}
                - name: UV_CACHE_MAX_MB
                  value: {{ .Values.api.cliJobs.uvCache.prune.maxMB | quote }}
              volumeMounts:
                - name: uv-cache
                  mountPath: {{ .Values.api.cliJobs.uvCache.mountPath }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
{{- end }}
