{{- if .Values.objectStorage.seaweedfs.enabled }}
{{- /*
  One-shot Job that waits for SeaweedFS S3 to be ready, then:
  1. Creates the log bucket if it does not exist.
  2. (Optionally) uploads an iam.json so requests with the generated credentials are accepted.

  SeaweedFS accepts unauthenticated requests when no iam config is present, so for
  development / minikube the job simply pre-creates the bucket.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "classifyre.fullname" . }}-seaweedfs-init
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs-init
  annotations:
    # Run this job on every install/upgrade so the bucket is always present.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "classifyre.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seaweedfs-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -ec
            - |
              S3_HOST="{{ include "classifyre.s3Endpoint" . }}"
              BUCKET="{{ .Values.objectStorage.bucket }}"

              echo "Waiting for SeaweedFS S3 at ${S3_HOST}..."
              for i in $(seq 1 60); do
                if curl -fsS --max-time 3 "${S3_HOST}/" >/dev/null 2>&1 || \
                   curl -fsS --max-time 3 "${S3_HOST}/" 2>&1 | grep -q "NoSuchBucket\|AccessDenied\|ListBuckets"; then
                  break
                fi
                echo "  attempt ${i}/60 — not ready yet"
                sleep 5
              done

              echo "Creating bucket ${BUCKET}..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "${S3_HOST}/${BUCKET}" 2>&1)
              if echo "${HTTP_CODE}" | grep -qE "^(200|409)"; then
                echo "Bucket ${BUCKET} ready (HTTP ${HTTP_CODE})."
              else
                echo "Unexpected HTTP ${HTTP_CODE} creating bucket — continuing anyway."
              fi
              echo "SeaweedFS init complete."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
