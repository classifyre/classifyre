{{- /*
  S3 credentials secret for the API.

  SeaweedFS mode  : injected when objectStorage.seaweedfs.enabled=true and no existingSecret.
  External mode   : injected when objectStorage.seaweedfs.enabled=false and no existingSecret.

  The secret is also used by the seaweedfs-bucket-init Job (if SeaweedFS is enabled) to
  pre-create the bucket before the API starts.
*/}}

{{- if not .Values.objectStorage.seaweedfs.enabled }}
  {{- /* ── External S3 credentials ─────────────────────────────────────── */}}
  {{- if not .Values.objectStorage.external.existingSecret }}
    {{- if not .Values.objectStorage.external.accessKeyId }}
      {{- fail "objectStorage.external.accessKeyId is required when seaweedfs is disabled and no existingSecret is provided" }}
    {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.fullname" . }}-s3-credentials
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ .Values.objectStorage.external.accessKeyId | quote }}
  secret-access-key: {{ .Values.objectStorage.external.secretAccessKey | quote }}
  {{- end }}
{{- else }}
  {{- /* ── SeaweedFS credentials ───────────────────────────────────────── */}}
  {{- if not .Values.objectStorage.seaweedfs.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.fullname" . }}-s3-credentials
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
  annotations:
    # These credentials are for the in-cluster SeaweedFS S3 endpoint only.
    # They are generated at install time and reused across upgrades.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  access-key-id: {{ default (randAlphaNum 20) .Values.objectStorage.seaweedfs.accessKeyId | quote }}
  secret-access-key: {{ default (randAlphaNum 40) .Values.objectStorage.seaweedfs.secretAccessKey | quote }}
  {{- end }}
{{- end }}
