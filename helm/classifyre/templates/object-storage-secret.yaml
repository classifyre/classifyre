{{- if and .Values.objectStorage.enabled (not .Values.objectStorage.existingSecret) }}
  {{- if not .Values.objectStorage.accessKeyId }}
    {{- fail "objectStorage.accessKeyId is required when objectStorage.enabled=true and no existingSecret is set" }}
  {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.fullname" . }}-s3-credentials
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ .Values.objectStorage.accessKeyId | quote }}
  secret-access-key: {{ .Values.objectStorage.secretAccessKey | quote }}
{{- end }}
