# Local k3d overrides. Production defaults and templates remain unchanged.
api:
  replicaCount: 1
  autoscaling:
    enabled: false
  pdb:
    enabled: false

  image:
    repository: oven/bun
    tag: latest
    pullPolicy: Always

  embedding:
    enabled: false

  command: ["/bin/sh", "-lc"]
  args:
    - |
      set -eu
      cd /workspace
      dependency_hash="$(sha256sum bun.lock package.json apps/api/package.json packages/schemas/package.json apps/api/prisma/schema.prisma | sha256sum | cut -d ' ' -f 1)"
      marker="/var/cache/classifyre/bun/dependencies-${dependency_hash}"
      if [ ! -f "${marker}" ]; then
        while ! mkdir /var/cache/classifyre/bun/install.lock 2>/dev/null; do sleep 0.2; done
        trap 'rmdir /var/cache/classifyre/bun/install.lock 2>/dev/null || true' EXIT
        if [ ! -f "${marker}" ]; then
          bun install --frozen-lockfile --filter @classifyre/api
          cd /workspace/apps/api
          bun run prisma:generate
          touch "${marker}"
          cd /workspace
        fi
        rmdir /var/cache/classifyre/bun/install.lock
        trap - EXIT
      else
        while [ -d /var/cache/classifyre/bun/install.lock ]; do sleep 0.2; done
      fi
      cd /workspace/apps/api
      export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}"
      until bun -e 'const net = require("net"); const socket = net.connect(Number(process.env.DB_PORT), process.env.DB_HOST, () => { socket.end(); process.exit(0); }); socket.on("error", () => process.exit(1)); setTimeout(() => process.exit(1), 1000);'; do
        echo "Waiting for PostgreSQL at ${DB_HOST}:${DB_PORT}"
        sleep 1
      done
      exec bun --watch src/main.ts

  env:
    NODE_ENV: development
    PORT: "8000"
    ENVIRONMENT: kubernetes
    HOME: /tmp
    BUN_INSTALL_CACHE_DIR: /var/cache/classifyre/bun/install
    TEMP_DIR: /tmp
    RUNNER_LOGS_DIR: /tmp/classifyre/runner-logs
    MAX_RUNNERS_PER_SOURCE: "5"
    MAX_CONCURRENT_RUNNERS: "2"
    DEMO_MODE: "false"

  extraVolumeMounts:
    - name: development-source
      mountPath: /workspace/package.json
      subPath: package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/bun.lock
      subPath: bun.lock
      readOnly: true
    - name: development-source
      mountPath: /workspace/turbo.json
      subPath: turbo.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/patches
      subPath: patches
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/package.json
      subPath: apps/api/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/blog/package.json
      subPath: apps/blog/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/cli/package.json
      subPath: apps/cli/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/desktop/package.json
      subPath: apps/desktop/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/docs/package.json
      subPath: apps/docs/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/e2e/package.json
      subPath: apps/e2e/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/web/package.json
      subPath: apps/web/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/api-client/package.json
      subPath: packages/api-client/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/devops/package.json
      subPath: packages/devops/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/eslint-config/package.json
      subPath: packages/eslint-config/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/schemas/package.json
      subPath: packages/schemas/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/typescript-config/package.json
      subPath: packages/typescript-config/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/ui/package.json
      subPath: packages/ui/package.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/src
      subPath: apps/api/src
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/prisma
      subPath: apps/api/prisma
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/prisma.config.ts
      subPath: apps/api/prisma.config.ts
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/nest-cli.json
      subPath: apps/api/nest-cli.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/tsconfig.json
      subPath: apps/api/tsconfig.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/apps/api/tsconfig.build.json
      subPath: apps/api/tsconfig.build.json
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/schemas/src
      subPath: packages/schemas/src
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/eslint-config/base.js
      subPath: packages/eslint-config/base.js
      readOnly: true
    - name: development-source
      mountPath: /workspace/packages/typescript-config/base.json
      subPath: packages/typescript-config/base.json
      readOnly: true
    - name: api-root-node-modules
      mountPath: /workspace/node_modules
    - name: api-node-modules
      mountPath: /workspace/apps/api/node_modules
    - name: api-schemas-node-modules
      mountPath: /workspace/packages/schemas/node_modules
    - name: api-eslint-node-modules
      mountPath: /workspace/packages/eslint-config/node_modules
    - name: api-typescript-config-node-modules
      mountPath: /workspace/packages/typescript-config/node_modules
    - name: api-bun-cache
      mountPath: /var/cache/classifyre/bun
  extraVolumes:
    - name: development-source
      hostPath:
        path: /var/lib/classifyre/source
        type: Directory
    - name: api-root-node-modules
      hostPath:
        path: /var/lib/classifyre/cache/api/root-node-modules
        type: Directory
    - name: api-node-modules
      hostPath:
        path: /var/lib/classifyre/cache/api/api-node-modules
        type: Directory
    - name: api-schemas-node-modules
      hostPath:
        path: /var/lib/classifyre/cache/api/schemas-node-modules
