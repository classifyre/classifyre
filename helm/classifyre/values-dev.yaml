        type: Directory

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
    initialDelaySeconds: 2
    periodSeconds: 5
  startupProbe:
    enabled: true
    periodSeconds: 2
    failureThreshold: 90

  # With the init-container disabled, the API's existing Kubernetes startup
  # path applies pending migrations using the same source-mounted runtime.
  migration:
    enabled: false

  cliJobs:
    enabled: true
    image:
      repository: classifyre/cli
      tag: latest
      pullPolicy: Always
    workDir: /app/apps/cli
    cleanupPolicy: failed
    backoffLimit: 0
    extraVolumeMounts:
      - name: cli-development-source
        mountPath: /app/apps/cli/src
        readOnly: true
      - name: schemas-development-source
        mountPath: /app/packages/schemas/src
        readOnly: true
    extraVolumes:
      - name: cli-development-source
        hostPath:
          path: /var/lib/classifyre/source/apps/cli/src
          type: Directory
      - name: schemas-development-source
        hostPath:
          path: /var/lib/classifyre/source/packages/schemas/src
          type: Directory
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 10Gi
    uvCache:
      enabled: true
      accessModes: [ReadWriteOnce]
      size: 5Gi
      prune:
        enabled: false

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

frontend:
  replicaCount: 1
  autoscaling:
    enabled: false
  pdb:
    enabled: false

  image:
    repository: oven/bun
    tag: latest
    pullPolicy: Always

  command: ["/bin/sh", "-lc"]
  args:
    - |
      set -eu
      cd /workspace
      dependency_hash="$(sha256sum bun.lock package.json apps/web/package.json packages/api-client/package.json packages/schemas/package.json packages/ui/package.json | sha256sum | cut -d ' ' -f 1)"
      marker="/var/cache/classifyre/bun/dependencies-${dependency_hash}"
      if [ ! -f "${marker}" ]; then
        bun install --frozen-lockfile --filter @classifyre/web
        touch "${marker}"
      fi
      cd /workspace/apps/web
      exec bun --bun next dev --turbopack --hostname 0.0.0.0 --port 3000

  service:
    type: ClusterIP
    port: 3000

  env:
    NODE_ENV: development
    PORT: "3000"
    HOSTNAME: 0.0.0.0
    NEXT_PUBLIC_API_URL: /api

  extraEnv:
