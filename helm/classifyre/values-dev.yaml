ingress:
  enabled: true
  className: nginx
  host: classifyre.localhost

postgres:
  mode: embedded
  embedded:
    database: classifyre
    username: postgres
    password: postgres
    persistence:
      enabled: false
    parameters:
      shared_buffers: 128MB
      work_mem: 8MB
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

networkPolicy:
  enabled: false
priorityClasses:
  create: false
telemetry:
  enabled: false
  instanceId:
    enabled: false
objectStorage:
  enabled: false
