[project]
name = "classifyre-schemas"
version = "0.4.56.dev0"
description = "Shared JSON schemas for Classifyre monorepo"
requires-python = ">=3.12"
dependencies = [
    "fastjsonschema==2.21.2",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/schemas"]
