name: Manual E2E Tests

# Manual trigger for running Playwright end-to-end tests from the @classifyre/e2e workspace.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Using same env vars as other workflows in the repo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        # Root-level install for monorepo dependencies
        run: bun install --frozen-lockfile

      - name: Create .env from secret
        # Create the .env file in the e2e app directory as requested
        working-directory: apps/e2e
        run: echo "${{ secrets.DEVELOP_E2E_ENV_VAR }}" > .env

      - name: Install Playwright browsers
        # Note: --with-deps requires sudo/root (provided by ubuntu-latest runners)
        working-directory: apps/e2e
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        # Use the newly added e2e:test script in apps/e2e
        working-directory: apps/e2e
        run: bun run e2e:test

      - name: Upload Playwright report
        if: always()
        # Using same version as ci.yml
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
