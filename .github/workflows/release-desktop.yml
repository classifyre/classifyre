name: Release Desktop

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.25)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.25)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set desktop version from tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          cd apps/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set desktop version to $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall (dylib symlinks)
        run: node apps/desktop/scripts/postinstall.js

      - name: Generate Prisma client
        run: bun run --cwd apps/api prisma:generate

      - name: Build API
        run: bun run --cwd apps/api build

      - name: Build web (static export)
        shell: bash
        run: bash apps/desktop/scripts/desktop-web-build.sh

      - name: Stage resources
        shell: bash
        run: |
          RESOURCES="apps/desktop/resources"
          mkdir -p "$RESOURCES"/{api,web,cli,prisma}

          cp -r apps/api/dist "$RESOURCES/api/dist"
          cp apps/api/package.json "$RESOURCES/api/package.json"
          cp -r apps/api/prisma "$RESOURCES/prisma"

          if [ -d apps/web/out ]; then
            cp -r apps/web/out/* "$RESOURCES/web/"
          fi

          cp -r apps/cli/src "$RESOURCES/cli/src"
          cp apps/cli/pyproject.toml "$RESOURCES/cli/pyproject.toml"
          [ -f apps/cli/uv.lock ] && cp apps/cli/uv.lock "$RESOURCES/cli/uv.lock" || true

      - name: Package Electron app
        run: bun run --cwd apps/desktop build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc codesign macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found"
            exit 1
          fi
          echo "Signing $APP"
          codesign --deep --force --sign - "$APP"
          codesign --verify --deep "$APP"
          echo "Signature valid"

      - name: Create distributables
        run: bun run --cwd apps/desktop make --skip-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          OUTDIR="apps/desktop/out"
          echo "Files in make output:"
          find "$OUTDIR" -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.zip' -o -name '*.nupkg' \) | tee /tmp/artifacts.txt
          if [ ! -s /tmp/artifacts.txt ]; then
            echo "::error::No desktop artifacts found"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/out/**/*.dmg
            apps/desktop/out/**/*.deb
            apps/desktop/out/**/*.zip
            apps/desktop/out/**/*.nupkg
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Release
    needs: build
    if: always() && !cancelled() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f | head -30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
