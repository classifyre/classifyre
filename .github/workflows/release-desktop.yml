name: Release Desktop

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.25). Empty = snapshot build: keeps the -SNAPSHOT package.json version and skips the release upload."
        required: false
        type: string
        default: ""
      publish:
        description: "Upload distributables to the GitHub Release (requires tag)"
        required: false
        type: boolean
        default: true
      only:
        description: "Optional: build a single platform (mac-arm64 | win-x64 | linux-amd64 | linux-arm64)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.25)"
        required: true
        type: string
      only:
        description: "Optional: build a single platform (mac-arm64 | win-x64 | linux-amd64 | linux-arm64). Saves runner time when retrying one failed platform."
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

# Real releases (tag set) serialize per tag; snapshot builds (no tag) get a
# unique group so they never queue behind a release or each other.
concurrency:
  group: release-desktop-${{ inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  # Computes the build matrix. The optional `only` input (workflow_dispatch)
  # narrows a retry to a single platform — rebuilding all four to retry one
  # failed mac notarization wastes ~45 runner-minutes per attempt. The
  # release-triggered path (workflow_call, no `only`) builds everything.
  # (A job-level `if` can't see the matrix context, hence this planning job.)
  plan:
    name: Plan build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        env:
          ONLY: ${{ inputs.only }}
        run: |
          # Pinned mac image (not macos-latest): release builds sign +
          # notarize, and image rollovers have broken that before.
          # Intel-mac (x86_64) dropped: onnxruntime stopped shipping macOS
          # x86_64 wheels at 1.27.0, so the CLI venv can no longer be staged
          # on that target. Apple Silicon is the only supported mac build.
          ALL='[
            {"os":"macos-15","platform":"mac-arm64"},
            {"os":"windows-latest","platform":"win-x64"},
            {"os":"ubuntu-latest","platform":"linux-amd64"},
            {"os":"ubuntu-24.04-arm","platform":"linux-arm64"}
          ]'
          if [ -n "${ONLY:-}" ]; then
            MATRIX=$(echo "$ALL" | jq -c --arg p "$ONLY" '[.[] | select(.platform == $p)]')
          else
            MATRIX=$(echo "$ALL" | jq -c .)
          fi
          if [ "$(echo "$MATRIX" | jq length)" -eq 0 ]; then
            echo "::error::Unknown platform '$ONLY' (expected mac-arm64 | win-x64 | linux-amd64 | linux-arm64)"
            exit 1
          fi
          echo "Building: $(echo "$MATRIX" | jq -r '[.[].platform] | join(", ")')"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    # Hard ceiling for the whole job. Without it a stalled Apple notarization
    # once kept the mac job "in progress" for 5+ hours. Typical green mac run
    # is ~90 min; the ceiling only exists for the pathological case (bounded
    # notarize retries can add up to ~2h on top of staging + signing).
    timeout-minutes: 240

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Snapshot builds (no tag) keep the -SNAPSHOT versions from the repo.
      # The ROOT package.json must be stamped too: the web bundle bakes it in
      # (packages/ui/src/lib/software-version.ts), so stamping only the desktop
      # package left released apps showing x.y.z-SNAPSHOT in Settings.
      - name: Set version from tag
        if: inputs.tag != ''
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          for PKG in package.json apps/desktop/package.json apps/api/package.json apps/web/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PKG','utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync('$PKG', JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          echo "Set version to $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo $VERSION_CODENAME)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18
          echo "PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config" >> "$GITHUB_ENV"

      - name: Install PostgreSQL 18 development files (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@18
          echo "PG_CONFIG=$(brew --prefix postgresql@18)/bin/pg_config" >> "$GITHUB_ENV"

      - name: Install PostgreSQL 18 development files (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install postgresql18 --no-progress -y
          "PGROOT=C:\Program Files\PostgreSQL\18" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- macOS code signing & notarization (skipped when secrets are absent,
      # e.g. fork PRs; the ad-hoc fallback below keeps those builds bootable).
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Developer ID intermediate CA
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          curl -fsSL -o DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          sudo security import DeveloperIDG2CA.cer -k /Library/Keychains/System.keychain || true
          rm DeveloperIDG2CA.cer

      - name: Prepare notarization API key
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          {
            echo "MACOS_SIGN=1"
            echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER_ID=${{ secrets.APPLE_API_ISSUER_ID }}"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall (dylib symlinks)
        run: node apps/desktop/scripts/postinstall.js

      # Builds API + web and stages EVERYTHING the app bundles: api dist +
      # production node_modules (incl. prisma CLI), web static export, Python
      # CLI + standalone CPython + pre-baked venv, and prisma migrations.
      # Same script as local `make stage`.
      - name: Stage resources
        shell: bash
        run: bash apps/desktop/scripts/stage-resources.sh

      # Packaging only copies + signs here — notarization happens in the
      # dedicated step below. Keeping notarytool out of Forge means a notary
      # retry never repeats the expensive deep-sign.
      - name: Package Electron app
        shell: bash
        timeout-minutes: 60
        run: |
          # macOS signs every Mach-O in the bundle (~1000 venv .so files)
          # via concurrent `codesign` spawns. This exhausts file descriptors and
          # throws `spawn codesign EMFILE`. A high shell `ulimit -n` alone is not
          # enough — macOS also caps opens at the kernel's kern.maxfilesperproc —
          # so raise both the kernel limits and the soft limit before packaging.
          if [ "${{ runner.os }}" = "macOS" ]; then
            sudo sysctl -w kern.maxfiles=1048576 kern.maxfilesperproc=1048576 || true
            ulimit -n 1048576 2>/dev/null || ulimit -n 200000 2>/dev/null || ulimit -n 65536 || true
            echo "open-file limit: $(ulimit -n); kern.maxfilesperproc: $(sysctl -n kern.maxfilesperproc)"
          fi
          bun run --cwd apps/desktop build

      # Re-sign the packaged bundle with the MODERN osx-sign (2.x) before
      # notarizing. @electron/packager 18.4.4 pins osx-sign ^1.0.5 (→1.3.3, the
      # last CJS release; 2.x is ESM-only and packager `require()`s it), and
      # 1.3.3's signatures were rejected by Apple's notary with "The signature
      # of the binary is invalid" on the GPU/Renderer/Plugin helpers. This step
      # re-signs the final .app with osx-sign 2.5.0 (a direct devDependency,
      # imported by an ESM script so the require-ESM constraint doesn't apply),
      # replacing 1.3.3's signatures inside-out with correct per-helper
      # entitlements. The re-sign is ~40s (api ships as one api.tar.gz).
      #
      # The local `codesign --verify --deep --strict` is INFORMATIONAL only:
      # `--deep` verification is deprecated by Apple and reports spurious errors
      # (e.g. "code has no resources but signature indicates they must be
      # present") that the notary itself does not enforce. The notary step below
      # is the authoritative gate — it fails the build and prints `notarytool
      # log` when Apple genuinely rejects something.
      - name: Re-sign with modern osx-sign (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGN == '1'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name 'Classifyre.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found to re-sign"
            exit 1
          fi
          # Match the packaging step's raised FD limits (the re-sign walks the
          # same Mach-O set).
          sudo sysctl -w kern.maxfiles=1048576 kern.maxfilesperproc=1048576 || true
          ulimit -n 1048576 2>/dev/null || ulimit -n 200000 2>/dev/null || ulimit -n 65536 || true
          node apps/desktop/scripts/resign-macos.mjs "$APP"
          echo "Informational verify (deprecated --deep; notary is the real gate):"
          codesign --verify --deep --strict --verbose=2 "$APP" || \
            echo "::warning::codesign --deep --strict reported issues; deferring to notary verdict"

      # Notarization is driven directly (not via Forge/@electron/notarize)
      # because their `notarytool submit --wait` has NO timeout — Apple's
      # long-poll hung CI runs for 2.5-5 h (run #35 cleanup killed an orphan
      # notarytool after 150 min). Doing it here gives: a native --timeout,
      # cheap retries (re-upload only — the deep-sign is not repeated),
      # visible per-attempt progress, and `notarytool log` output when Apple
      # actually rejects something.
      - name: Notarize and staple (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGN == '1'
        shell: bash
        timeout-minutes: 140
        run: |
          APP=$(find apps/desktop/out -name 'Classifyre.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found to notarize"
            exit 1
          fi
          ts() { date -u '+%H:%M:%S'; }
          sw_vers
          xcrun notarytool --version || true

          # Connectivity preflight: if Apple is unreachable before we even
          # upload, say so directly instead of burning notarytool attempts.
          if ! curl -sSI --connect-timeout 15 https://appstoreconnect.apple.com >/dev/null; then
            echo "::warning::appstoreconnect.apple.com unreachable from this runner — expect upload trouble"
          fi

          ZIP="$RUNNER_TEMP/classifyre-notarize.zip"
          echo "[$(ts)] Zipping $APP for notarization…"
          ditto -c -k --keepParent "$APP" "$ZIP"
          du -h "$ZIP"

          # --no-s3-acceleration: notarytool defaults to the S3
          # transfer-acceleration endpoint, which GitHub's mac runners cannot
          # reach reliably (run #36: stalled uploads, "No network route").
          KEYCHAIN_ARGS=(--key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID")

          # Phase 1 — upload ONCE (submit without --wait returns the
          # submission id immediately after upload; Apple's scan continues
          # server-side). Only transport failures are retried, with backoff.
          SUBMISSION_ID=""
          delay=30
          for attempt in 1 2 3; do
            echo "[$(ts)] Upload attempt $attempt"
            set +e
            xcrun notarytool submit "$ZIP" "${KEYCHAIN_ARGS[@]}" \
              --no-s3-acceleration --output-format json \
              > "$RUNNER_TEMP/notary-submit.json"
            rc=$?
            set -e
            cat "$RUNNER_TEMP/notary-submit.json" || true
            SUBMISSION_ID=$(jq -r '.id // empty' "$RUNNER_TEMP/notary-submit.json" 2>/dev/null || true)
            if [ -n "$SUBMISSION_ID" ]; then
              echo "[$(ts)] Uploaded; submission id: $SUBMISSION_ID"
              break
            fi
            if ! curl -sSI --connect-timeout 15 https://appstoreconnect.apple.com >/dev/null; then
              echo "::warning::Upload attempt $attempt failed (rc=$rc) — runner lost connectivity to Apple"
            else
              echo "::warning::Upload attempt $attempt failed (rc=$rc); Apple reachable — retrying in ${delay}s"
            fi
            sleep "$delay"; delay=$((delay * 2))
          done
          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::Could not upload for notarization after 3 attempts"
            exit 1
          fi

          # Phase 2 — poll the SAME submission (no re-upload). `wait` failing
          # here is only a dropped long-poll; the scan keeps running at Apple,
          # so polling again is free. Backoff between reconnects.
          delay=30
          for attempt in 1 2 3 4 5; do
            echo "[$(ts)] Waiting for verdict (poll attempt $attempt)"
            set +e
            xcrun notarytool wait "$SUBMISSION_ID" "${KEYCHAIN_ARGS[@]}" \
              --timeout 20m --output-format json \
              > "$RUNNER_TEMP/notary-wait.json"
            rc=$?
            set -e
            cat "$RUNNER_TEMP/notary-wait.json" || true
            STATUS=$(jq -r '.status // empty' "$RUNNER_TEMP/notary-wait.json" 2>/dev/null || true)
            case "$STATUS" in
              Accepted)
                echo "[$(ts)] Notarization accepted; stapling…"
                xcrun stapler staple "$APP"
                xcrun stapler validate "$APP"
                exit 0
                ;;
              Invalid|Rejected)
                # A real verdict — retrying cannot change it. Surface Apple's
                # reasons and fail fast.
                echo "::error::Notarization $STATUS (submission $SUBMISSION_ID)"
                xcrun notarytool log "$SUBMISSION_ID" "${KEYCHAIN_ARGS[@]}" || true
                exit 1
                ;;
            esac
            echo "::warning::Poll attempt $attempt inconclusive (rc=$rc, status='${STATUS:-none}'); retrying in ${delay}s"
            sleep "$delay"; delay=$((delay * 2))
          done
          echo "::error::No notarization verdict for $SUBMISSION_ID after ~100 minutes of polling"
          xcrun notarytool info "$SUBMISSION_ID" "${KEYCHAIN_ARGS[@]}" || true
          exit 1

      # Fallback for builds without signing secrets: Apple Silicon refuses to
      # launch completely unsigned binaries, so ad-hoc sign them.
      - name: Ad-hoc codesign macOS app (unsigned builds only)
        if: runner.os == 'macOS' && env.MACOS_SIGN != '1'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found"
            exit 1
          fi
          echo "Ad-hoc signing $APP"
          codesign --deep --force --sign - "$APP"
          codesign --verify --deep "$APP"

      - name: Verify signature and notarization
        if: runner.os == 'macOS' && env.MACOS_SIGN == '1'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name '*.app' -type d | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=2 "$APP"
          echo "Signed and notarized OK"

      # The packaged app MUST run from outside the repo checkout: Node walks up
      # parent directories looking for node_modules, so a binary launched from
      # apps/desktop/out/ can silently resolve modules from the workspace
      # install — masking "module not shipped in the bundle" bugs that then
      # crash on every real user machine (this exact false positive shipped a
      # mac build whose asar had no embedded-postgres).
      - name: Smoke test packaged app
        shell: bash
        timeout-minutes: 30
        run: |
          case "${{ runner.os }}" in
            macOS)
              BIN=$(find apps/desktop/out -path '*Classifyre.app/Contents/MacOS/classifyre-desktop' | head -1)
              ;;
            Windows)
              BIN=$(find apps/desktop/out -name 'classifyre-desktop.exe' -not -path '*make*' | head -1)
              ;;
            Linux)
              BIN=$(find apps/desktop/out -name 'classifyre-desktop' -type f -not -path '*make*' | head -1)
              ;;
          esac
          if [ -z "$BIN" ]; then
            echo "::error::Packaged binary not found"
            exit 1
          fi
          case "${{ runner.os }}" in
            macOS)   PKG_DIR=$(dirname "$(dirname "$(dirname "$(dirname "$BIN")")")") ;; # …/<platform-dir>/Classifyre.app/Contents/MacOS/bin
            *)       PKG_DIR=$(dirname "$BIN") ;;
          esac
          SMOKE_DIR="$RUNNER_TEMP/classifyre-smoke-app"
          rm -rf "$SMOKE_DIR"
          mkdir -p "$SMOKE_DIR"
          cp -R "$PKG_DIR/." "$SMOKE_DIR/"
          REL_BIN="${BIN#"$PKG_DIR"/}"
          SMOKE_BIN="$SMOKE_DIR/$REL_BIN"
          echo "Smoke testing $SMOKE_BIN (copied outside the workspace)"
          cd apps/desktop
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get install -y xvfb
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" xvfb-run -a npx tsx test/smoke.ts
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" xvfb-run -a npx tsx test/deep-smoke.ts
          elif [ "${{ runner.os }}" = "macOS" ]; then
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/smoke.ts
            # Deep smoke: creates a workspace and waits for the API — proves
            # prisma migrate, the staged api node_modules, and the Python venv
            # relocation all work in the packaged bundle.
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/deep-smoke.ts
          else
            # Windows: embedded PG cannot run under the CI admin account, so
            # only the boot-diagnostic smoke runs (it self-skips on that).
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/smoke.ts
          fi
          rm -rf "$SMOKE_DIR"

      # rpmbuild's default %install post-processing (brp-strip) runs `strip` on
      # every binary in the payload and exits non-zero on the bundled standalone
      # CPython (".dynstr not in segment") and the cross-arch *.bare prebuilds
      # ("Unable to recognise the format"), which fails the rpm maker. Disable
      # the brp-* post steps so the payload is packaged as-is (we don't want the
      # relocatable CPython stripped anyway).
      - name: Disable rpm binary post-processing (Linux)
        if: runner.os == 'Linux'
        run: printf '%%__os_install_post %%{nil}\n' > "$HOME/.rpmmacros"

      - name: Create distributables
        timeout-minutes: 60
        run: bun run --cwd apps/desktop make --skip-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The DMG maker already names its output Classifyre-<version>-<arch>.dmg,
      # so no platform-suffix rename is needed (the old rename produced the
      # confusing Classifyre-x.y.z-arm64-mac-arm64.dmg double-arch name).

      # Only scan the maker output (out/classifyre/make — forge.config.ts sets
      # buildIdentifier 'classifyre'). The packaged app trees under out/
      # contain the API's full node_modules on win/linux, and a bare
      # out/**/*.zip glob swept npm test fixtures (thread-stream's
      # test-package.zip / ts-commonjs-default-export.zip) into the release —
      # and their duplicate names across platform artifacts broke the upload.
      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          OUTDIR="apps/desktop/out/classifyre/make"
          echo "Files in make output:"
          if [ ! -d "$OUTDIR" ]; then
            echo "::error::Make output directory not found: $OUTDIR"
            ls -la apps/desktop/out/ 2>/dev/null || echo "  (apps/desktop/out also missing)"
            exit 1
          fi
          find "$OUTDIR" -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name '*.zip' \) | tee /tmp/artifacts.txt
          if [ ! -s /tmp/artifacts.txt ]; then
            echo "::error::No desktop artifacts found in $OUTDIR"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/out/classifyre/make/**/*.dmg
            apps/desktop/out/classifyre/make/**/*.deb
            apps/desktop/out/classifyre/make/**/*.rpm
            apps/desktop/out/classifyre/make/**/*.zip
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Release
    needs: build
    if: always() && !cancelled() && needs.build.result != 'cancelled' && inputs.publish != false && inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f | head -30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
