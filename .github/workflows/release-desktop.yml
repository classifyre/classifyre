name: Release Desktop

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.25)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.25)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
          # Intel-mac (x86_64) dropped: onnxruntime stopped shipping macOS
          # x86_64 wheels at 1.27.0, so the CLI venv can no longer be staged
          # on this target. Apple Silicon is the only supported mac build.
          - os: windows-latest
            platform: win-x64
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    # Hard ceiling for the whole job. Without it a stalled Apple notarization
    # once kept the mac job "in progress" for 5+ hours. Typical green mac run
    # is ~90 min; the ceiling only exists for the pathological case (bounded
    # notarize retries can add up to ~2h on top of staging + signing).
    timeout-minutes: 240

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set desktop version from tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          cd apps/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set desktop version to $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # --- macOS code signing & notarization (skipped when secrets are absent,
      # e.g. fork PRs; the ad-hoc fallback below keeps those builds bootable).
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Developer ID intermediate CA
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          curl -fsSL -o DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          sudo security import DeveloperIDG2CA.cer -k /Library/Keychains/System.keychain || true
          rm DeveloperIDG2CA.cer

      - name: Prepare notarization API key
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          {
            echo "MACOS_SIGN=1"
            echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER_ID=${{ secrets.APPLE_API_ISSUER_ID }}"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall (dylib symlinks)
        run: node apps/desktop/scripts/postinstall.js

      # Builds API + web and stages EVERYTHING the app bundles: api dist +
      # production node_modules (incl. prisma CLI), web static export, Python
      # CLI + standalone CPython + pre-baked venv, and prisma migrations.
      # Same script as local `make stage`.
      - name: Stage resources
        shell: bash
        run: bash apps/desktop/scripts/stage-resources.sh

      # Packaging only copies + signs here — notarization happens in the
      # dedicated step below. Keeping notarytool out of Forge means a notary
      # retry never repeats the expensive deep-sign.
      - name: Package Electron app
        shell: bash
        timeout-minutes: 60
        run: |
          # macOS signs every Mach-O in the bundle (~1000 venv .so files)
          # via concurrent `codesign` spawns. This exhausts file descriptors and
          # throws `spawn codesign EMFILE`. A high shell `ulimit -n` alone is not
          # enough — macOS also caps opens at the kernel's kern.maxfilesperproc —
          # so raise both the kernel limits and the soft limit before packaging.
          if [ "${{ runner.os }}" = "macOS" ]; then
            sudo sysctl -w kern.maxfiles=1048576 kern.maxfilesperproc=1048576 || true
            ulimit -n 1048576 2>/dev/null || ulimit -n 200000 2>/dev/null || ulimit -n 65536 || true
            echo "open-file limit: $(ulimit -n); kern.maxfilesperproc: $(sysctl -n kern.maxfilesperproc)"
          fi
          bun run --cwd apps/desktop build

      # Notarization is driven directly (not via Forge/@electron/notarize)
      # because their `notarytool submit --wait` has NO timeout — Apple's
      # long-poll hung CI runs for 2.5-5 h (run #35 cleanup killed an orphan
      # notarytool after 150 min). Doing it here gives: a native --timeout,
      # cheap retries (re-upload only — the deep-sign is not repeated),
      # visible per-attempt progress, and `notarytool log` output when Apple
      # actually rejects something.
      - name: Notarize and staple (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGN == '1'
        shell: bash
        timeout-minutes: 140
        run: |
          APP=$(find apps/desktop/out -name 'Classifyre.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found to notarize"
            exit 1
          fi
          ZIP="$RUNNER_TEMP/classifyre-notarize.zip"
          echo "Zipping $APP for notarization…"
          ditto -c -k --keepParent "$APP" "$ZIP"
          du -h "$ZIP"

          # GitHub's mac runners cannot reliably reach notarytool's default
          # upload path: it uses the S3 transfer-acceleration endpoint, which
          # from these runners stalls mid-upload ("The Internet connection
          # appears to be offline") or loses the route entirely ("No network
          # route", run #36). Disable IPv6 (classic flake source on these
          # hosts) and force the plain S3 endpoint with --no-s3-acceleration.
          sudo networksetup -setv6off "Ethernet" 2>/dev/null || true
          sudo networksetup -setv6off "Wi-Fi" 2>/dev/null || true

          KEYCHAIN_ARGS=(--key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID")
          for attempt in 1 2 3; do
            echo "=== Notarization attempt $attempt ==="
            set +e
            xcrun notarytool submit "$ZIP" "${KEYCHAIN_ARGS[@]}" \
              --no-s3-acceleration --verbose \
              --wait --timeout 40m --output-format json > /tmp/notary.json
            rc=$?
            set -e
            cat /tmp/notary.json || true
            STATUS=$(jq -r '.status // empty' /tmp/notary.json 2>/dev/null || true)
            SUBMISSION_ID=$(jq -r '.id // empty' /tmp/notary.json 2>/dev/null || true)
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted (submission $SUBMISSION_ID); stapling…"
              xcrun stapler staple "$APP"
              xcrun stapler validate "$APP"
              exit 0
            fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              # A real verdict from Apple — retrying won't change it. Surface why.
              echo "::error::Notarization $STATUS (submission $SUBMISSION_ID)"
              xcrun notarytool log "$SUBMISSION_ID" "${KEYCHAIN_ARGS[@]}" || true
              exit 1
            fi
            # rc != 0 with no verdict → upload/poll flake or 40m timeout while
            # Apple was still scanning. A resubmission is safe (and often fast:
            # Apple caches scan results by content hash).
            echo "::warning::Attempt $attempt inconclusive (rc=$rc, status='$STATUS'); retrying"
          done
          echo "::error::Notarization did not complete after 3 attempts"
          exit 1

      # Fallback for builds without signing secrets: Apple Silicon refuses to
      # launch completely unsigned binaries, so ad-hoc sign them.
      - name: Ad-hoc codesign macOS app (unsigned builds only)
        if: runner.os == 'macOS' && env.MACOS_SIGN != '1'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found"
            exit 1
          fi
          echo "Ad-hoc signing $APP"
          codesign --deep --force --sign - "$APP"
          codesign --verify --deep "$APP"

      - name: Verify signature and notarization
        if: runner.os == 'macOS' && env.MACOS_SIGN == '1'
        shell: bash
        run: |
          APP=$(find apps/desktop/out -name '*.app' -type d | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=2 "$APP"
          echo "Signed and notarized OK"

      # The packaged app MUST run from outside the repo checkout: Node walks up
      # parent directories looking for node_modules, so a binary launched from
      # apps/desktop/out/ can silently resolve modules from the workspace
      # install — masking "module not shipped in the bundle" bugs that then
      # crash on every real user machine (this exact false positive shipped a
      # mac build whose asar had no embedded-postgres).
      - name: Smoke test packaged app
        shell: bash
        timeout-minutes: 30
        run: |
          case "${{ runner.os }}" in
            macOS)
              BIN=$(find apps/desktop/out -path '*Classifyre.app/Contents/MacOS/classifyre-desktop' | head -1)
              ;;
            Windows)
              BIN=$(find apps/desktop/out -name 'classifyre-desktop.exe' -not -path '*make*' | head -1)
              ;;
            Linux)
              BIN=$(find apps/desktop/out -name 'classifyre-desktop' -type f -not -path '*make*' | head -1)
              ;;
          esac
          if [ -z "$BIN" ]; then
            echo "::error::Packaged binary not found"
            exit 1
          fi
          case "${{ runner.os }}" in
            macOS)   PKG_DIR=$(dirname "$(dirname "$(dirname "$(dirname "$BIN")")")") ;; # …/<platform-dir>/Classifyre.app/Contents/MacOS/bin
            *)       PKG_DIR=$(dirname "$BIN") ;;
          esac
          SMOKE_DIR="$RUNNER_TEMP/classifyre-smoke-app"
          rm -rf "$SMOKE_DIR"
          mkdir -p "$SMOKE_DIR"
          cp -R "$PKG_DIR/." "$SMOKE_DIR/"
          REL_BIN="${BIN#"$PKG_DIR"/}"
          SMOKE_BIN="$SMOKE_DIR/$REL_BIN"
          echo "Smoke testing $SMOKE_BIN (copied outside the workspace)"
          cd apps/desktop
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get install -y xvfb
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" xvfb-run -a npx tsx test/smoke.ts
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" xvfb-run -a npx tsx test/deep-smoke.ts
          elif [ "${{ runner.os }}" = "macOS" ]; then
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/smoke.ts
            # Deep smoke: creates a workspace and waits for the API — proves
            # prisma migrate, the staged api node_modules, and the Python venv
            # relocation all work in the packaged bundle.
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/deep-smoke.ts
          else
            # Windows: embedded PG cannot run under the CI admin account, so
            # only the boot-diagnostic smoke runs (it self-skips on that).
            CLASSIFYRE_APP_PATH="$SMOKE_BIN" npx tsx test/smoke.ts
          fi
          rm -rf "$SMOKE_DIR"

      # rpmbuild's default %install post-processing (brp-strip) runs `strip` on
      # every binary in the payload and exits non-zero on the bundled standalone
      # CPython (".dynstr not in segment") and the cross-arch *.bare prebuilds
      # ("Unable to recognise the format"), which fails the rpm maker. Disable
      # the brp-* post steps so the payload is packaged as-is (we don't want the
      # relocatable CPython stripped anyway).
      - name: Disable rpm binary post-processing (Linux)
        if: runner.os == 'Linux'
        run: printf '%%__os_install_post %%{nil}\n' > "$HOME/.rpmmacros"

      - name: Create distributables
        timeout-minutes: 60
        run: bun run --cwd apps/desktop make --skip-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Both mac jobs produce "Classifyre.dmg"; suffix the platform so the two
      # DMGs don't overwrite each other in the GitHub release.
      - name: Rename artifacts with platform suffix
        if: runner.os == 'macOS'
        shell: bash
        run: |
          find apps/desktop/out -type f -name '*.dmg' | while read -r f; do
            base="${f%.dmg}"
            mv "$f" "${base}-${{ matrix.platform }}.dmg"
          done

      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          OUTDIR="apps/desktop/out"
          echo "Files in make output:"
          find "$OUTDIR" -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name '*.zip' \) | tee /tmp/artifacts.txt
          if [ ! -s /tmp/artifacts.txt ]; then
            echo "::error::No desktop artifacts found"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/out/**/*.dmg
            apps/desktop/out/**/*.deb
            apps/desktop/out/**/*.rpm
            apps/desktop/out/**/*.zip
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Release
    needs: build
    if: always() && !cancelled() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f | head -30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
