name: Deploy Image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment / namespace"
        required: true
        default: "classifyre-develop"
        type: choice
        options:
          - classifyre-develop
          - classifyre
      image_tag:
        description: "Docker image tag to deploy (branch name, version, etc.)"
        required: false
        default: "develop"
      demo_mode:
        description: "Enable demo mode"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      scale_down:
        description: "Scale the app to zero after verifying it is alive (parks the release between runs)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  workflow_call:
    inputs:
      environment:
        type: string
        default: "classifyre-develop"
      image_tag:
        type: string
        default: "develop"
      demo_mode:
        type: string
        default: "true"
      scale_down:
        type: string
        default: "false"
    secrets:
      DOCKER_USERNAME:
        required: true
      KUBECONFIG:
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag || 'develop' }} → ${{ inputs.environment || 'classifyre-develop' }}
    runs-on: ubuntu-latest

    env:
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      HELM_NAMESPACE: ${{ inputs.environment || 'classifyre-develop' }}
      IMAGE_TAG: ${{ inputs.image_tag || 'develop' }}
      DEMO_MODE: ${{ inputs.demo_mode || 'true' }}
      SCALE_DOWN: ${{ inputs.scale_down || 'false' }}

    steps:
      - name: Derive environment settings
        id: env
        run: |
          set -euo pipefail
          ns="${{ env.HELM_NAMESPACE }}"
          if [[ "${ns}" == "classifyre" ]]; then
            echo "release_name=classifyre"           >> "$GITHUB_OUTPUT"
            echo "values_file=./helm/classifyre/values-vps.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=classifyre-develop"   >> "$GITHUB_OUTPUT"
            echo "values_file=./helm/classifyre/values-vps-develop.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: develop

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Show deployment target
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
          HELM_VALUES_FILE: ${{ steps.env.outputs.values_file }}
        run: |
          set -euo pipefail
          echo "Namespace:   ${HELM_NAMESPACE}"
          echo "Release:     ${HELM_RELEASE_NAME}"
          echo "Values file: ${HELM_VALUES_FILE}"
          echo "Image tag:   ${IMAGE_TAG}"
          echo "API image:   ${DOCKER_NAMESPACE}/api:${IMAGE_TAG}"
          echo "Web image:   ${DOCKER_NAMESPACE}/web:${IMAGE_TAG}"
          echo "CLI image:   ${DOCKER_NAMESPACE}/cli:${IMAGE_TAG}"
          echo "Demo mode:   ${DEMO_MODE}"

      - name: Clear pending Helm operation
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
        run: |
          set -euo pipefail

          history_json="$(helm history "${HELM_RELEASE_NAME}" -n "${HELM_NAMESPACE}" -o json 2>/dev/null || true)"
          if [[ -z "${history_json}" || "${history_json}" == "[]" ]]; then
            echo "No existing Helm release state to clear."
            exit 0
          fi

          last_status="$(jq -r '.[-1].status // empty' <<< "${history_json}")"
          last_revision="$(jq -r '.[-1].revision // empty' <<< "${history_json}")"

          if [[ "${last_status}" != pending-* ]]; then
            echo "Helm release is not pending (${last_status:-unknown})."
            exit 0
          fi

          if [[ -z "${last_revision}" ]]; then
            echo "::error::Pending Helm release detected but revision could not be resolved."
            exit 1
          fi

          echo "Deleting stale Helm release secret for pending revision ${last_revision}."
          kubectl -n "${HELM_NAMESPACE}" delete secret "sh.helm.release.v1.${HELM_RELEASE_NAME}.v${last_revision}" --ignore-not-found=true

      - name: Deploy with Helm
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
          HELM_VALUES_FILE: ${{ steps.env.outputs.values_file }}
        run: |
          set -euo pipefail

          helm upgrade --install "${HELM_RELEASE_NAME}" ./helm/classifyre \
            --namespace "${HELM_NAMESPACE}" \
            --create-namespace \
            -f "${HELM_VALUES_FILE}" \
            --set api.image.repository="${DOCKER_NAMESPACE}/api" \
            --set api.image.tag="${IMAGE_TAG}" \
            --set api.cliJobs.image.repository="${DOCKER_NAMESPACE}/cli" \
            --set api.cliJobs.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${DOCKER_NAMESPACE}/web" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set-string api.env.DEMO_MODE="${DEMO_MODE}" \
            --wait \
            --timeout 15m

      - name: Force rollouts
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
        run: |
          set -euo pipefail
          for deployment in api web; do
            echo "Forcing rollout for ${HELM_RELEASE_NAME}-${deployment}"
            kubectl -n "${HELM_NAMESPACE}" rollout restart deployment/"${HELM_RELEASE_NAME}-${deployment}"
            kubectl -n "${HELM_NAMESPACE}" rollout status deployment/"${HELM_RELEASE_NAME}-${deployment}" --timeout=10m
          done

      - name: Scale down after verify
        if: ${{ env.SCALE_DOWN == 'true' }}
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
        run: |
          set -euo pipefail

          echo "SCALE_DOWN=true → parking ${HELM_RELEASE_NAME} at zero replicas."

          # Remove HPAs first so they don't immediately scale the deployments
          # back up (minReplicas). The next helm upgrade recreates them.
          for name in api web; do
            kubectl -n "${HELM_NAMESPACE}" delete hpa "${HELM_RELEASE_NAME}-${name}" \
              --ignore-not-found=true
          done

          for name in api web; do
            echo "Scaling deployment/${HELM_RELEASE_NAME}-${name} to 0"
            kubectl -n "${HELM_NAMESPACE}" scale deployment/"${HELM_RELEASE_NAME}-${name}" \
              --replicas=0
          done

          # Wait until the app pods are actually gone so the run reflects the
          # parked state. The next deploy's helm upgrade restores replicas.
          for name in api web; do
            kubectl -n "${HELM_NAMESPACE}" rollout status \
              deployment/"${HELM_RELEASE_NAME}-${name}" --timeout=5m || true
          done

          echo "Release parked. The next deploy starts from the scaled-down state."

      - name: Show rollout status
        env:
          HELM_RELEASE_NAME: ${{ steps.env.outputs.release_name }}
        run: |
          set -euo pipefail
          kubectl -n "${HELM_NAMESPACE}" get deploy,pods,svc
          helm status "${HELM_RELEASE_NAME}" -n "${HELM_NAMESPACE}"
