name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release version increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

permissions:
  actions: read
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release From Main
    runs-on: ubuntu-latest

    env:
      DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      HELM_RELEASE_NAME: classifyre
      HELM_NAMESPACE: classifyre
      HELM_VALUES_FILE: ./helm/classifyre/values-vps.yaml
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN || '' }}
      REPO: ${{ github.repository }}

    steps:
      - name: Require main branch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Release can only be run from the main branch"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Verify checkout matches origin/main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          local_sha="$(git rev-parse HEAD)"
          remote_sha="$(git rev-parse origin/main)"
          if [[ "${local_sha}" != "${remote_sha}" ]]; then
            echo "::error::Checked out commit is not the current origin/main head"
            exit 1
          fi

      - name: Verify main CI already succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          expected_sha="$(git rev-parse HEAD)"
          run_json="$(
            gh api "repos/${REPO}/actions/workflows/ci.yml/runs?branch=main&status=completed&per_page=20" \
              --jq ".workflow_runs | map(select(.head_sha == \"${expected_sha}\")) | sort_by(.created_at) | reverse | .[0]"
          )"

          if [[ -z "${run_json}" || "${run_json}" == "null" ]]; then
            echo "::error::No completed CI run found for main@${expected_sha}"
            exit 1
          fi

          conclusion="$(jq -r '.conclusion // empty' <<< "${run_json}")"
          html_url="$(jq -r '.html_url // empty' <<< "${run_json}")"

          if [[ "${conclusion}" != "success" ]]; then
            echo "::error::Latest CI for main@${expected_sha} is not successful (${conclusion:-unknown}). ${html_url}"
            exit 1
          fi

      - name: Resolve release versions
        id: versions
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          set -euo pipefail

          raw_version="$(node -p "require('./package.json').version")"
          current_version="${raw_version%%-*}"
          if ! [[ "${current_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json version (${raw_version}) must start with major.minor.patch"
            exit 1
          fi

          if ! [[ "${RELEASE_TYPE}" =~ ^(patch|minor|major)$ ]]; then
            echo "::error::release_type must be one of: patch, minor, major"
            exit 1
          fi

          version="$(
            CURRENT="${current_version}" node -e "
              const type = process.env.RELEASE_TYPE;
              const [major, minor, patch] = process.env.CURRENT.split('.').map(Number);
              const next =
                type === 'major' ? [major + 1, 0, 0] :
                type === 'minor' ? [major, minor + 1, 0] :
                [major, minor, patch + 1];
              process.stdout.write(next.join('.'));
            "
          )"
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "${tag}" | grep -q "${tag}$"; then
            echo "::error::Tag ${tag} already exists on origin"
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply release version
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/set-release-version.mjs "${VERSION}"
          (cd apps/cli && uv lock)
          (cd packages/schemas && uv lock)

      - name: Commit release version
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          git add \
            package.json \
            apps/api/package.json \
            apps/blog/package.json \
            apps/docs/package.json \
            apps/web/package.json \
            apps/cli/package.json \
            apps/cli/pyproject.toml \
            apps/cli/uv.lock \
            packages/api-client/package.json \
            packages/devops/package.json \
            packages/schemas/package.json \
            packages/schemas/pyproject.toml \
            packages/schemas/uv.lock \
            helm/classifyre/Chart.yaml

          git commit -m "chore(release): v${VERSION}"

      - name: Create local release tag
        run: git tag "${{ steps.versions.outputs.tag }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate code
        run: bun run codegen

      - name: Generate docs artifacts
        run: bun run docs:generate

      - name: Build release artifacts
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Stage release Docker artifacts
        run: |
          bun run docs:bundle
          bash ./scripts/stage-docker-artifacts.sh "${RUNNER_TEMP}/release-artifacts"

      - name: Free disk space for release image builds
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release images
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail

          build_and_push() {
            local repository="$1"
            local target="$2"

            docker buildx build \
              --target "${target}" \
              --platform "${DOCKER_PLATFORMS}" \
              --push \
              --tag "${DOCKER_NAMESPACE}/${repository}:${VERSION}" \
              --tag "${DOCKER_NAMESPACE}/${repository}:latest" \
              --build-context "api-dist=${RUNNER_TEMP}/release-artifacts/api-dist" \
              --build-context "codegen=${RUNNER_TEMP}/release-artifacts/codegen" \
              --build-context "web-dist=${RUNNER_TEMP}/release-artifacts/web-dist" \
              --cache-from "type=registry,ref=${DOCKER_NAMESPACE}/${repository}:build-cache" \
              --cache-to "type=registry,ref=${DOCKER_NAMESPACE}/${repository}:build-cache,mode=max,image-manifest=true" \
              .
          }

          build_and_push "all-in-one" "runtime"
          build_and_push "web" "web-final"
          build_and_push "api" "api-final"
          build_and_push "cli" "cli-final"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Docker Hub for Helm chart publish
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Publish Helm chart to Docker Hub OCI
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          helm lint helm/classifyre
          helm package helm/classifyre
          helm push "classifyre-core-${VERSION}.tgz" "oci://registry-1.docker.io/${DOCKER_NAMESPACE}"
          echo "Published oci://registry-1.docker.io/${DOCKER_NAMESPACE}/classifyre-core:${VERSION}"

      - name: Publish classifyre-schemas to PyPI
        if: env.PYPI_TOKEN != ''
        working-directory: packages/schemas
        env:
          UV_PUBLISH_TOKEN: ${{ env.PYPI_TOKEN }}
        run: |
          uv build
          uv publish

      - name: Publish classifyre-cli to PyPI
        if: env.PYPI_TOKEN != ''
        working-directory: apps/cli
        env:
          UV_PUBLISH_TOKEN: ${{ env.PYPI_TOKEN }}
        run: |
          uv build
          uv publish

      - name: Push release commit and tag to main
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.versions.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Merge release back to develop
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B develop origin/develop
          git merge origin/main --no-edit \
            -m "chore: merge release v${VERSION} back to develop"
          git push origin develop

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Clear pending Helm operation
        run: |
          set -euo pipefail

          history_json="$(helm history "${HELM_RELEASE_NAME}" -n "${HELM_NAMESPACE}" -o json 2>/dev/null || true)"
          if [[ -z "${history_json}" || "${history_json}" == "[]" ]]; then
            echo "No existing Helm release state to clear."
            exit 0
          fi

          last_status="$(jq -r '.[-1].status // empty' <<< "${history_json}")"
          last_revision="$(jq -r '.[-1].revision // empty' <<< "${history_json}")"

          if [[ "${last_status}" != pending-* ]]; then
            echo "Helm release is not pending (${last_status:-unknown})."
            exit 0
          fi

          if [[ -z "${last_revision}" ]]; then
            echo "::error::Pending Helm release detected but revision could not be resolved."
            exit 1
          fi

          echo "Deleting stale Helm release secret for pending revision ${last_revision}."
          kubectl -n "${HELM_NAMESPACE}" delete secret "sh.helm.release.v1.${HELM_RELEASE_NAME}.v${last_revision}" --ignore-not-found=true

      - name: Deploy release with Helm
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          helm upgrade --install "${HELM_RELEASE_NAME}" ./helm/classifyre \
            --namespace "${HELM_NAMESPACE}" \
            --create-namespace \
            -f "${HELM_VALUES_FILE}" \
            --set api.image.tag="${VERSION}" \
            --set api.cliJobs.image.tag="${VERSION}" \
            --set frontend.image.tag="${VERSION}" \
            --wait \
            --timeout 15m

      - name: Verify deployment
        env:
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail
          kubectl -n "${HELM_NAMESPACE}" rollout status deployment/${HELM_RELEASE_NAME}-api --timeout=300s
          kubectl -n "${HELM_NAMESPACE}" rollout status deployment/${HELM_RELEASE_NAME}-web --timeout=300s
          kubectl -n "${HELM_NAMESPACE}" get deploy,pods,svc
          helm status "${HELM_RELEASE_NAME}" -n "${HELM_NAMESPACE}"
