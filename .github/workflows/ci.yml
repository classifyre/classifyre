name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_call' && format('ci-gate-{0}', github.run_id) || format('{0}-{1}-{2}', github.workflow, github.event_name, github.ref) }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  INTEGRATION_DATABASE_URL: ${{ secrets.INTEGRATION_DATABASE_URL || vars.INTEGRATION_DATABASE_URL || '' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Remove local Python virtualenvs
        run: rm -rf apps/cli/.venv packages/schemas/.venv

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            apps/cli/pyproject.toml
            apps/cli/uv.lock
            packages/schemas/pyproject.toml
            packages/schemas/uv.lock

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        # Dependabot updates package.json but bun.lock may lag (bun lockfile format
        # is not natively written by Dependabot). The dependabot-codegen workflow
        # commits the corrected lockfile back, so skip --frozen-lockfile there.
        run: |
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Generate code
        run: bun run codegen

      - name: Generate docs artifacts
        run: bun run docs:generate

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Stage CI artifacts
        if: github.event_name != 'workflow_call' && github.event.action != 'closed'
        run: |
          # Ensure static docs are exported and synced into web public assets.
          bun run docs:bundle
          bash ./scripts/stage-docker-artifacts.sh /tmp/classifyre-ci-artifacts

      - name: Upload api build
        if: github.event_name != 'workflow_call' && github.event.action != 'closed'
        uses: actions/upload-artifact@v6
        with:
          name: api-build
          path: /tmp/classifyre-ci-artifacts/api-dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload codegen
        if: github.event_name != 'workflow_call' && github.event.action != 'closed'
        uses: actions/upload-artifact@v6
        with:
          name: codegen
          path: /tmp/classifyre-ci-artifacts/codegen
          if-no-files-found: error
          retention-days: 1

      - name: Upload web dist
        if: github.event_name != 'workflow_call' && github.event.action != 'closed'
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: /tmp/classifyre-ci-artifacts/web-dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Verify generated files are committed
        if: success() || failure()
        run: |
          if ! git diff --quiet -- \
            apps/docs/src/_generated/helm-values.mdx \
            packages/api-client/src/generated \
            apps/cli/src/models/generated_input.py \
            apps/cli/src/models/generated_detectors.py \
            apps/cli/src/models/generated_single_asset_scan_results.py; then
            echo "::error::Generated files are out of date. Run 'bun run codegen', 'bun run docs:generate', and commit changes."
            git status --short -- \
              apps/docs/src/_generated/helm-values.mdx \
              packages/api-client/src/generated \
              apps/cli/src/models/generated_input.py \
              apps/cli/src/models/generated_detectors.py \
              apps/cli/src/models/generated_single_asset_scan_results.py
            git diff --stat -- \
              apps/docs/src/_generated/helm-values.mdx \
              packages/api-client/src/generated \
              apps/cli/src/models/generated_input.py \
              apps/cli/src/models/generated_detectors.py \
              apps/cli/src/models/generated_single_asset_scan_results.py
            exit 1
          fi

      - name: Lint
        if: success() || failure()
        run: bun run lint

      - name: Install Playwright browsers
        if: success() || failure()
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Unit tests
        if: success() || failure()
        run: bun run test

      - name: API integration tests
        if: (success() || failure()) && env.INTEGRATION_DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ env.INTEGRATION_DATABASE_URL }}
          INTEGRATION_TEST_RESET_DB: "1"
          INTEGRATION_TEST_SCHEMA_KEY: ${{ github.head_ref || github.ref_name }}
        run: cd apps/api && bun run test:integration:run

  docker:
    name: Build ${{ matrix.name }} (linux/amd64,linux/arm64)
    needs: [validate]
    if: always() && !cancelled() && needs.validate.result != 'skipped' && github.event_name != 'workflow_call' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-in-one
            repository: all-in-one
            target: runtime
          - name: web
            repository: web
            target: web-final
          - name: api
            repository: api
            target: api-final
          - name: cli
            repository: cli
            target: cli-final

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download api build
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: api-dist

      - name: Download codegen
        uses: actions/download-artifact@v4
        with:
          name: codegen
          path: codegen

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Free disk space for all-in-one build
        if: matrix.name == 'all-in-one'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        # Skip QEMU when running locally with act: Docker Desktop uses Rosetta 2
        # for linux/amd64 builds on Apple Silicon, which is stable. Installing
        # QEMU binfmt handlers overrides Rosetta 2 and causes bun (in api-builder)
        # to SIGSEGV inside linux/amd64 containers on an arm64 host.
        if: ${{ !env.ACT }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        if: ${{ !env.ACT }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ format('{0}/{1}', secrets.DOCKER_USERNAME, matrix.repository) }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Extract metadata (act fallback)
        id: meta_act
        if: ${{ env.ACT }}
        run: |
          echo "tags=${{ secrets.DOCKER_USERNAME }}/${{ matrix.repository }}:${{ steps.tag.outputs.value }}" >> "$GITHUB_OUTPUT"
          echo "labels=" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags || steps.meta_act.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels || steps.meta_act.outputs.labels }}
          build-contexts: |
            api-dist=${{ github.workspace }}/api-dist
            codegen=${{ github.workspace }}/codegen
            web-dist=${{ github.workspace }}/web-dist
          cache-from: type=registry,ref=${{ format('{0}/{1}:build-cache', secrets.DOCKER_USERNAME, matrix.repository) }}
          cache-to: type=registry,ref=${{ format('{0}/{1}:build-cache', secrets.DOCKER_USERNAME, matrix.repository) }},mode=max,image-manifest=true
