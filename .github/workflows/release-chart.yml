name: Release Chart

# Use this workflow when you need to fix/update the Helm chart without
# bumping the app version or rebuilding Docker images.
#
# It bumps Chart.yaml `version` only — `appVersion` (and all images) stay as-is.
# The updated chart is published to Docker Hub as an OCI artifact:
#   oci://registry-1.docker.io/<DOCKER_USERNAME>/classifyre-core:<version>
#
# Tag convention: chart-v<version>  (e.g. chart-v1.0.1)
# This is distinct from app release tags (v<version>) so the two streams
# are easy to tell apart in git history.

on:
  workflow_dispatch:
    inputs:
      chart-version:
        description: "New chart version (major.minor.patch)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-chart:
    name: Publish chart update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version and check for conflicts
        id: version
        env:
          INPUT_VERSION: ${{ inputs.chart-version }}
        run: |
          set -euo pipefail

          VERSION="${INPUT_VERSION#v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match major.minor.patch"
            exit 1
          fi

          TAG="chart-v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}$"; then
            echo "::error::Tag ${TAG} already exists on origin"
            exit 1
          fi

          CHART_FILE="helm/classifyre/Chart.yaml"
          current=$(grep -m1 "^version:" "${CHART_FILE}" | awk '{print $2}')
          if [ "${current}" = "${VERSION}" ]; then
            echo "::error::Chart is already at version ${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "current_version=${current}" >> "${GITHUB_OUTPUT}"

      - name: Update Chart.yaml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Bump `version` only — `appVersion` (the deployed image tag) is intentionally left unchanged.
          sed -i "s/^version:.*/version: ${VERSION}/" helm/classifyre/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/classifyre

      - name: Commit and tag
        id: commit
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/classifyre/Chart.yaml
          git commit -m "chore(helm): ${TAG}"
          git tag "${TAG}"
          git push origin HEAD:main
          git push origin "${TAG}"

      - name: Log in to Docker Hub for Helm chart publish
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Package and push chart to Docker Hub OCI
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          helm package helm/classifyre
          helm push "classifyre-core-${VERSION}.tgz" "oci://registry-1.docker.io/${DOCKER_NAMESPACE}"
          echo "Published oci://registry-1.docker.io/${DOCKER_NAMESPACE}/classifyre-core:${VERSION}"
