name: Cleanup Docker Hub Tags

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview deletions only"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  cleanup-dockerhub-tags:
    name: Cleanup Docker Hub Tags
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cleanup old Docker Hub tags
        run: bash ./scripts/cleanup-dockerhub-tags.sh
