version: 2

updates:
  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
    groups:
      # One PR for all minor/patch bumps; majors get individual PRs (breaking changes).
      actions-non-major:
        update-types: [minor, patch]

  # ── JS/TS monorepo (bun workspaces) ────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, javascript]
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR for all minor/patch bumps; majors get individual PRs (breaking changes).
      js-non-major:
        update-types: [minor, patch]
    # Packages with known breaking major upgrades — ignore majors until ready
    ignore:
      # TS 6.0 breaks NestJS DTOs — unpin after DTO classes are migrated
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      # ESLint 10 incompatible with eslint-plugin-react@7 — unpin after react plugin v8 ships
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      # react-hooks v7 adds new rules that break existing code — unpin after fixing violations
      - dependency-name: eslint-plugin-react-hooks
        update-types: ["version-update:semver-major"]
      # recharts v3 changed tooltip payload API — unpin after migrating chart.tsx
      - dependency-name: recharts
        update-types: ["version-update:semver-major"]
      # @base-ui/react >=1.2 references Element at module level, breaking Next.js SSG
      # (combobox.tsx imports it; barrel export pulls it into SSR bundles)
      # Unpin when base-ui adds proper SSR guards or combobox moves to a lazy import
      - dependency-name: "@base-ui/react"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # react-medium-image-zoom >=5.4.2 uses `instanceof Element` in render path,
      # crashing Next.js SSG workers (no DOM globals in Node.js).
      # Unpin when the package adds a typeof Element guard (SSR-safe check)
      - dependency-name: react-medium-image-zoom
        update-types: ["version-update:semver-patch"]
      # Next 16.2 broke Nextra MDX metadata exports — unpin when Nextra fixes it
      - dependency-name: next
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@next/eslint-plugin-next"
        update-types: ["version-update:semver-patch"]

  # ── Python CLI ─────────────────────────────────────────────────────────────
  - package-ecosystem: uv
    directory: /apps/cli
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR for all minor/patch bumps; majors get individual PRs (breaking changes).
      python-non-major:
        update-types: [minor, patch]

  # ── Python Schemas ──────────────────────────────────────────────────────────
  - package-ecosystem: uv
    directory: /packages/schemas
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-non-major:
        update-types: [minor, patch]

  # ── Docker ──────────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, docker]
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-non-major:
        update-types: [minor, patch]

  # ── Helm: classifyre ────────────────────────────────────────────────────────
  - package-ecosystem: helm
    directory: /helm/classifyre
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, helm]
    commit-message:
      prefix: "chore(helm)"
    groups:
      helm-non-major:
        update-types: [minor, patch]

  # ── Helm: otel-receiver ─────────────────────────────────────────────────────
  - package-ecosystem: helm
    directory: /helm/otel-receiver
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels: [dependencies, helm]
    commit-message:
      prefix: "chore(helm)"
    groups:
      helm-non-major:
        update-types: [minor, patch]
